name: Set up Python, uv & dependencies
description: Install Python 3.11, uv with caching, and sync project dependencies.

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --all-extras --dev
      shell: bash
