name: Setup Node.js for Dashboard V2
description: Install Node.js 20 with npm caching for the dashboard-v2 project.

runs:
  using: composite
  steps:
    - name: Setup Node.js for Dashboard V2
      uses: actions/setup-node@v6
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: src/dashboard_v2/package-lock.json