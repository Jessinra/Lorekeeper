name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-all-MiniLM-L6-v2

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Pre-warm embedding model
        env:
          HF_HOME: ~/.cache/huggingface
        run: |
          uv run python - << 'EOF'
          from sentence_transformers import SentenceTransformer
          SentenceTransformer("all-MiniLM-L6-v2")
          print("Model ready.")
          EOF

      - name: Ruff lint
        run: uv run ruff check src tests scripts/

      - name: Bandit security scan
        run: uv run bandit -r src/ -ll -c pyproject.toml --exit-zero 2>&1 || true

      - name: Biome JS lint (dashboard)
        run: npx @biomejs/biome check src/lorekeeper/dashboard/static/js/ 2>&1 || echo "No JS changes detected — skipping"

      - name: Dependency vulnerability scan
        run: uv run pip-audit --strict 2>&1 || echo "pip-audit not installed — skipping"

      - name: MCP tool documentation check
        run: uv run python scripts/check_mcp_docs.py

      - name: Proposal GitHub issue validation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run python scripts/check_issues.py

      - name: PR body convention check
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const headRef = context.payload.pull_request.head.ref;
            const body = context.payload.pull_request.body || '';
            const isProposal = headRef.startsWith('proposal/');
            const hasCloses = /\bcloses\s+#\d+/i.test(body);
            const hasRefs = /\brefs?\s+#\d+/i.test(body);

            if (isProposal && hasCloses) {
              core.setFailed(
                'Proposal PRs must use "Refs #N" not "Closes #N". ' +
                'Proposal tickets should not auto-close — use "Refs #N" to reference them.'
              );
            }

            if (!isProposal && !hasCloses && !hasRefs) {
              core.warning(
                'Feature/fix PRs should reference the issue. ' +
                'Add "Closes #N" (auto-close) or "Refs #N" (reference only) to the PR body.'
              );
            }

      - name: PR title & commit title convention check
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_COMMITS = 10;
            const TICKET_RE = /^\[LKPR-\d+\]/;

            // ── PR title check ──────────────────────────────────────────────
            const prTitle = context.payload.pull_request.title || '';
            if (!TICKET_RE.test(prTitle)) {
              core.setFailed(
                `PR title must start with [LKPR-N]. Got: "${prTitle}"\n` +
                '  Use [LKPR-0] for housekeeping (chore, docs, skill updates, etc.).'
              );
            }

            // ── Commit title check ──────────────────────────────────────────
            const { owner, repo } = context.repo;
            // Fetch commits via the compare API (supports up to ~250 commits)
            const compare = await github.rest.repos.compareCommits({
              owner, repo,
              base: context.payload.pull_request.base.sha,
              head: context.payload.pull_request.head.sha,
              per_page: MAX_COMMITS,
            });
            if (compare.data.commits.length >= MAX_COMMITS) {
              core.warning(`PR has ${compare.data.commits.length}+ commits — sampling first ${MAX_COMMITS}`);
            }
            const badCommits = compare.data.commits
              .filter(c => !TICKET_RE.test(c.commit.message.split('\n')[0]))
              .map(c => `  ${c.sha.slice(0, 7)}  ${c.commit.message.split('\n')[0]}`);

            if (badCommits.length > 0) {
              core.setFailed(
                `${badCommits.length} commit(s) missing [LKPR-N] prefix:\n${badCommits.join('\n')}\n\n` +
                'Tip: use `git rebase -i` to reword commit messages, then force-push.'
              );
            }

      - name: Prettier markdown check
        run: |
          while IFS= read -r -d '' f; do
            [ -f "$f" ] && printf '%s\0' "$f"
          done < <(git ls-files -z '*.md') | xargs -0 npx --yes prettier@3.5.3 --check --prose-wrap preserve

      - name: Skill format check
        run: uv run python scripts/check_skills.py

      - name: Run tests with coverage
        env:
          TOKENIZERS_PARALLELISM: "false"
          HF_HOME: ~/.cache/huggingface
        run: |
          set -o pipefail
          uv run --with pytest-cov pytest \
            --cov=src/lorekeeper \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --tb=short -q | tee pytest-cov.log

      - name: Summarize coverage in the job summary
        if: always()
        run: |
          {
            echo "## Coverage"
            echo
            if [ -f .coverage ]; then
              REPORT="$(uv run coverage report --skip-covered --show-missing)"
              printf '%s\n' "$REPORT" | tee coverage-report.txt
              echo '```'
              printf '%s\n' "$REPORT"
              echo '```'
              echo
              echo "HTML report: uploaded as an artifact named \`coverage-html\`."
              COVERAGE_TOTAL="$(printf '%s\n' "$REPORT" | awk '/^TOTAL[[:space:]]/ {print $NF; exit}')"
              {
                printf '%s\n' '<!-- coverage-summary -->'
                printf '%s\n' '## Coverage report'
                printf '%s\n' ''
                printf '%s\n' "- **Total:** ${COVERAGE_TOTAL:-unknown}"
                printf '%s\n' "- **Workflow run:** [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
                printf '%s\n' '- **HTML artifact:** `coverage-html`'
                printf '%s\n' ''
                printf '%s\n' 'The report is also available in the GitHub Actions job summary.'
              } > coverage-comment.md
            else
              echo "Coverage data not found."
              {
                printf '%s\n' '<!-- coverage-summary -->'
                printf '%s\n' '## Coverage report'
                printf '%s\n' ''
                printf '%s\n' 'Coverage data was not produced for this run.'
              } > coverage-comment.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov
          if-no-files-found: warn
          retention-days: 7

      - name: Post coverage summary to PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- coverage-summary -->';
            const body = fs.readFileSync('coverage-comment.md', 'utf8');
            if (!body.includes(marker)) {
              core.info('Coverage comment body missing marker; skipping.');
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing coverage comment ${existing.id}.`);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info('Created coverage comment.');
            }

      - name: Mypy type check
        run: uv run mypy src

      - name: PR size check
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_INSERTIONS = 1000;
            const MAX_FILES = 20;
            // Exclude docs/ and backlogs/ from size gate
            const EXCLUDE_PREFIXES = ['docs/', 'backlogs/'];
            // Allow deliberately large PRs to bypass the gate via label
            const BYPASS_LABEL = 'big_refactor';

            // Fetch labels fresh from the API rather than the webhook payload
            // snapshot, so the bypass works on job re-runs after the label is
            // added (the payload would otherwise reflect the original event).
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const labels = (pr.labels || []).map(l => l.name);
            if (labels.includes(BYPASS_LABEL)) {
              core.info(`PR labeled "${BYPASS_LABEL}" — skipping size gate.`);
              return;
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              },
            );

            let filteredAdditions = 0;
            let filteredChangedFiles = 0;
            for (const f of files) {
              const excluded = EXCLUDE_PREFIXES.some(p => f.filename.startsWith(p));
              if (!excluded) {
                filteredAdditions += f.additions;
                filteredChangedFiles += 1;
              }
            }

            if (filteredAdditions > MAX_INSERTIONS && filteredChangedFiles > MAX_FILES) {
              core.setFailed(
                `${filteredAdditions} insertions across ${filteredChangedFiles} files exceeds ${MAX_INSERTIONS}/${MAX_FILES} threshold. ` +
                'Large PRs skip depth review. Split into smaller PRs per concern.'
              );
            } else if (filteredAdditions > 500 || filteredChangedFiles > 10) {
              core.warning(
                `${filteredAdditions} insertions across ${filteredChangedFiles} files — large PR. Consider splitting into smaller changes.`
              );
            }

      - name: Coverage threshold gate
        if: always()
        run: |
          if [ -f .coverage ]; then
            TOTAL=$(uv run coverage report --skip-covered | awk '/^TOTAL/{print $NF}' | tr -d '%')
            MIN_COVERAGE=75
            if [ "${TOTAL%.*}" -lt "$MIN_COVERAGE" ] 2>/dev/null; then
              echo "::error::Coverage ${TOTAL}% is below minimum ${MIN_COVERAGE}%"
              exit 1
            fi
            echo "Coverage: ${TOTAL}% (threshold: ${MIN_COVERAGE}%%) ✓"
          else
            echo "Coverage data not found — skipping gate"
          fi

  e2e:
    name: E2E Tests (Playwright / Chromium)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-all-MiniLM-L6-v2

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Pre-warm embedding model
        env:
          HF_HOME: ~/.cache/huggingface
        run: |
          uv run python - << 'EOF'
          from sentence_transformers import SentenceTransformer
          SentenceTransformer("all-MiniLM-L6-v2")
          print("Model ready.")
          EOF

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run E2E tests
        env:
          TOKENIZERS_PARALLELISM: "false"
          HF_HOME: ~/.cache/huggingface
        run: |
          uv run pytest tests/e2e/ -m e2e --override-ini="addopts=" -v --tb=short