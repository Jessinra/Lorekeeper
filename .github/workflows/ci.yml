name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ── 1. PR metadata checks ────────────────────────────────────────────────────
  pr-check:
    name: PR Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: PR title & commit title convention check
        uses: actions/github-script@v9
        with:
          script: |
            const TICKET_RE = /^\[LKPR-\d+\]/;

            // ── PR title check ──────────────────────────────────────────────
            const prTitle = context.payload.pull_request.title || '';
            if (!TICKET_RE.test(prTitle)) {
              core.setFailed(
                `PR title must start with [LKPR-N]. Got: "${prTitle}"\n` +
                '  Use [LKPR-0] for housekeeping (chore, docs, skill updates, etc.).'
              );
            }

            // ── Commit title check ──────────────────────────────────────────
            const { owner, repo } = context.repo;
            const compare = await github.rest.repos.compareCommits({
              owner, repo,
              base: context.payload.pull_request.base.sha,
              head: context.payload.pull_request.head.sha,
            });
            const badCommits = compare.data.commits
              .filter(c => !TICKET_RE.test(c.commit.message.split('\n')[0]))
              .map(c => `  ${c.sha.slice(0, 7)}  ${c.commit.message.split('\n')[0]}`);

            if (badCommits.length > 0) {
              core.setFailed(
                `${badCommits.length} commit(s) missing [LKPR-N] prefix:\n${badCommits.join('\n')}\n\n` +
                'Tip: use `git rebase -i` to reword commit messages, then force-push.'
              );
            }

      - name: PR body convention check
        uses: actions/github-script@v9
        with:
          script: |
            const prTitle = context.payload.pull_request.title || '';
            const headRef = context.payload.pull_request.head.ref;
            const body = context.payload.pull_request.body || '';
            const isProposal = headRef.startsWith('proposal/');
            const isHousekeeping = prTitle.startsWith('[LKPR-0]');
            const hasCloses = /\bcloses\s+#\d+/i.test(body);
            const hasRefs = /\brefs?\s+#\d+/i.test(body);

            if (isProposal && hasCloses) {
              core.setFailed(
                'Proposal PRs must use "Refs #N" not "Closes #N". ' +
                'Proposal tickets should not auto-close — use "Refs #N" to reference them.'
              );
            }

            if (!isProposal && !isHousekeeping && !hasCloses && !hasRefs) {
              core.warning(
                'Feature/fix PRs should reference the issue. ' +
                'Add "Closes #N" (auto-close) or "Refs #N" (reference only) to the PR body.'
              );
            }

      - name: PR size check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_MAX_INSERTIONS: 1000
          PR_MAX_FILES: 20
          PR_WARN_INSERTIONS: 500
          PR_WARN_FILES: 10
          PR_EXCLUDE_PREFIXES: "docs/:backlogs/:design/"
          PR_BYPASS_LABEL: "big_refactor"
        run: |
          # Check bypass label via API before running the size gate.
          labels=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          if echo "$labels" | grep -q "${PR_BYPASS_LABEL}"; then
            echo "PR labeled '${PR_BYPASS_LABEL}' — skipping size gate."
            exit 0
          fi
          bash scripts/check_pr_size.sh "origin/${{ github.base_ref }}"

  # ── 2. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python, uv & dependencies
        uses: ./.github/actions/setup-python-uv

      - name: Ruff lint
        run: uv run ruff check src tests scripts/

      - name: Bandit security scan
        run: uv run bandit -r src/ -ll -c pyproject.toml --exit-zero 2>&1 || true

      - name: Biome JS lint (dashboard)
        run: npx @biomejs/biome check src/lorekeeper/dashboard/static/js/ 2>&1 || echo "No JS changes detected — skipping"

      - name: Dependency vulnerability scan
        run: uv run pip-audit --strict 2>&1 || echo "pip-audit not installed — skipping"

      - name: MCP tool documentation check
        run: uv run python scripts/check_mcp_docs.py

      - name: Proposal GitHub issue validation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run python scripts/check_issues.py

      - name: Prettier markdown check
        run: |
          while IFS= read -r -d '' f; do
            [ -f "$f" ] && printf '%s\0' "$f"
          done < <(git ls-files -z '*.md') | xargs -0 npx --yes prettier@3.5.3 --check --prose-wrap preserve

      - name: Skill format check
        run: uv run python scripts/check_skills.py

      - name: Mypy type check
        run: uv run mypy src

  # ── 3. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python, uv & dependencies
        uses: ./.github/actions/setup-python-uv

      - name: Cache & pre-warm HuggingFace model
        uses: ./.github/actions/setup-huggingface

      - name: Run tests with coverage
        env:
          TOKENIZERS_PARALLELISM: "false"
          HF_HOME: ~/.cache/huggingface
        run: |
          uv run pytest \
            --cov=src/lorekeeper \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --tb=short -q

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data
          path: |
            .coverage
            coverage.xml
            htmlcov/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 1

  # ── 4. Coverage ──────────────────────────────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python, uv & dependencies
        uses: ./.github/actions/setup-python-uv

      - name: Download coverage data
        uses: actions/download-artifact@v8
        with:
          name: coverage-data
        continue-on-error: true

      - name: Summarize coverage in the job summary
        run: |
          {
            echo "## Coverage"
            echo
            if [ -f .coverage ]; then
              REPORT="$(uv run coverage report --skip-covered --show-missing)"
              printf '%s\n' "$REPORT" | tee coverage-report.txt
              echo '```'
              printf '%s\n' "$REPORT"
              echo '```'
              echo
              echo "HTML report: uploaded as an artifact named \`coverage-html\`."
              COVERAGE_TOTAL="$(printf '%s\n' "$REPORT" | awk '/^TOTAL[[:space:]]/ {print $NF; exit}')"
            elif [ -f coverage.xml ]; then
              echo "Binary .coverage not found — reading total from coverage.xml."
              COVERAGE_TOTAL="$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          pct = float(root.attrib.get('line-rate', 0)) * 100
          print(f'{pct:.0f}%')
          ")"
              echo "Total coverage: ${COVERAGE_TOTAL}"
            fi
            if [ -n "${COVERAGE_TOTAL:-}" ]; then
              {
                printf '%s\n' '<!-- coverage-summary -->'
                printf '%s\n' '## Coverage report'
                printf '%s\n' ''
                printf '%s\n' "- **Total:** ${COVERAGE_TOTAL}"
                printf '%s\n' "- **Workflow run:** [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
                printf '%s\n' '- **HTML artifact:** `coverage-html`'
                printf '%s\n' ''
                printf '%s\n' 'The report is also available in the GitHub Actions job summary.'
              } > coverage-comment.md
            else
              echo "Coverage data not found."
              {
                printf '%s\n' '<!-- coverage-summary -->'
                printf '%s\n' '## Coverage report'
                printf '%s\n' ''
                printf '%s\n' 'Coverage data was not produced for this run.'
              } > coverage-comment.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov
          if-no-files-found: warn
          retention-days: 7

      - name: Post coverage summary to PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- coverage-summary -->';
            let body;
            try {
              body = fs.readFileSync('coverage-comment.md', 'utf8');
            } catch (e) {
              core.info('coverage-comment.md not found — skipping PR comment.');
              return;
            }
            if (!body.includes(marker)) {
              core.info('Coverage comment body missing marker; skipping.');
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing coverage comment ${existing.id}.`);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info('Created coverage comment.');
            }

      - name: Coverage threshold gate
        run: |
          MIN_COVERAGE=75
          if [ -f .coverage ]; then
            TOTAL=$(uv run coverage report --skip-covered | awk '/^TOTAL/{print $NF}' | tr -d '%')
          elif [ -f coverage.xml ]; then
            TOTAL=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          pct = float(root.attrib.get('line-rate', 0)) * 100
          print(f'{pct:.0f}')
          ")
          else
            echo "Coverage data not found — skipping gate"
            exit 0
          fi
          if [ "${TOTAL%.*}" -lt "$MIN_COVERAGE" ] 2>/dev/null; then
            echo "::error::Coverage ${TOTAL}% is below minimum ${MIN_COVERAGE}%"
            exit 1
          fi
          echo "Coverage: ${TOTAL}% (threshold: ${MIN_COVERAGE}%) ✓"

  # ── E2E ──────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright / Chromium)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python, uv & dependencies
        uses: ./.github/actions/setup-python-uv

      - name: Cache & pre-warm HuggingFace model
        uses: ./.github/actions/setup-huggingface

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run E2E tests
        env:
          TOKENIZERS_PARALLELISM: "false"
          HF_HOME: ~/.cache/huggingface
        run: |
          uv run pytest tests/e2e/ -m e2e --override-ini="addopts=" -v --tb=short
