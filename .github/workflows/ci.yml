name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-all-MiniLM-L6-v2

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Pre-warm embedding model
        env:
          HF_HOME: ~/.cache/huggingface
        run: |
          uv run python - << 'EOF'
          from sentence_transformers import SentenceTransformer
          SentenceTransformer("all-MiniLM-L6-v2")
          print("Model ready.")
          EOF

      - name: Ruff lint
        run: uv run ruff check src tests scripts/

      - name: MCP tool documentation check
        run: uv run python scripts/check_mcp_docs.py

      - name: Prettier markdown check
        run: |
          while IFS= read -r -d '' f; do
            [ -f "$f" ] && printf '%s\0' "$f"
          done < <(git ls-files -z '*.md') | xargs -0 npx --yes prettier@3.5.3 --check --prose-wrap preserve

      - name: Skill format check
        run: uv run python scripts/check_skills.py

      - name: Run tests with coverage
        env:
          TOKENIZERS_PARALLELISM: "false"
          HF_HOME: ~/.cache/huggingface
        run: |
          set -o pipefail
          uv run --with pytest-cov pytest \
            --cov=src/lorekeeper \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --tb=short -q | tee pytest-cov.log

      - name: Summarize coverage in the job summary
        if: always()
        run: |
          {
            echo "## Coverage"
            echo
            if [ -f .coverage ]; then
              uv run coverage report --skip-covered --show-missing | tee coverage-report.txt
              echo '```'
              cat coverage-report.txt
              echo '```'
              echo
              echo "HTML report: uploaded as an artifact named \`coverage-html\`."
            else
              echo "Coverage data not found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov
          if-no-files-found: warn
          retention-days: 7

      - name: Mypy type check
        run: uv run mypy src
