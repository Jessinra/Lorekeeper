<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorekeeper Banner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0f0a14;
    font-family: 'Inter', -apple-system, sans-serif;
  }

  .banner {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0f0a14 0%, #1a1225 30%, #2a1a3a 60%, #1a1225 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
  }

  /* Background geometric pattern */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 80%, rgba(123, 93, 139, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(123, 93, 139, 0.06) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(123, 93, 139, 0.03) 0%, transparent 70%);
    z-index: 0;
  }

  /* Hex grid overlay */
  .hex-grid {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    z-index: 1;
  }

  /* Ring logo */
  .ring-logo {
    width: 100px;
    height: 100px;
    position: relative;
    z-index: 2;
    margin-bottom: 32px;
  }

  .ring-logo svg {
    width: 100%;
    height: 100%;
  }

  .title {
    font-size: 64px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1.5px;
    z-index: 2;
    text-align: center;
    margin-bottom: 16px;
  }

  .title .accent {
    color: #b895d0;
  }

  .tagline {
    font-size: 22px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.7);
    z-index: 2;
    text-align: center;
    max-width: 640px;
    line-height: 1.5;
    letter-spacing: 0.2px;
  }

  .tagline .highlight {
    color: #d4b8e8;
    font-weight: 600;
  }

  .subtitle {
    margin-top: 40px;
    font-size: 15px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.4);
    z-index: 2;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid rgba(123, 93, 139, 0.3);
    padding: 10px 24px;
    border-radius: 8px;
    background: rgba(123, 93, 139, 0.08);
  }

  .version-badge {
    margin-top: 8px;
    margin-bottom: 4px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.35);
    z-index: 2;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #7b5d8b, #b895d0, #7b5d8b, transparent);
    z-index: 2;
  }

  /* Decorative circles */
  .deco-ring {
    position: absolute;
    border: 1px solid rgba(123, 93, 139, 0.1);
    border-radius: 50%;
    z-index: 1;
  }

  .deco-ring-1 {
    width: 500px;
    height: 500px;
    top: -150px;
    right: -100px;
  }

  .deco-ring-2 {
    width: 350px;
    height: 350px;
    bottom: -100px;
    left: -80px;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="deco-ring deco-ring-1"></div>
  <div class="deco-ring deco-ring-2"></div>

  <div class="ring-logo">
    <!-- Official Lorekeeper Logo — Keeper's Ring (C-c V3c) -->
    <!-- Color: Dusty Violet #7b5d8b -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100" height="100">
      <circle cx="256" cy="256" r="182" fill="none" stroke="#7b5d8b" stroke-width="22"/>
      <circle cx="256" cy="256" r="132" fill="none" stroke="#7b5d8b" stroke-width="42"/>
      <polygon points="256,50 294,116 256,182 218,116" fill="#0f0a14"/>
    </svg>
  </div>

  <div class="title">Lorekeeper</div>
  <div class="version-badge">v0.3.0 beta</div>
  <div class="tagline">
    Self-improving memory for <span class="highlight">AI agents</span><br>
    One command · No cloud · No config
  </div>
  <div class="subtitle">pip install lorekeeper-mcp</div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
