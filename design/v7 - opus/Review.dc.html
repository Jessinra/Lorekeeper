      `</div>`;
    root.querySelector('#rv-refresh').addEventListener('click',()=>{ self.closeDrawer(); self.refreshStale([id]); });
    root.querySelector('#rv-del').addEventListener('click',()=>{ self.closeDrawer(); self.removeStale([id]); self.toast('Memory deleted.'); });
    this.openDrawer();
  }
  openDrawer(){ const root=document.getElementById('rev-root'); root.querySelector('#rv-drawer').classList.add('open'); root.querySelector('#rv-scrim').classList.add('open'); }
  closeDrawer(){ const root=document.getElementById('rev-root'); root.querySelector('#rv-drawer').classList.remove('open'); root.querySelector('#rv-scrim').classList.remove('open'); }
  renderVals(){ return {}; }
}
</script>
</body>
</html>
