document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ory composer would open here.\" class=\"tbtn\" style=\"background:#7c5cff;border-color:#7c5cff;color:#fff;\"><svg style=\"width:14px;height:14px\"><use href=\"#i-plus\"><\u002Fuse><\u002Fsvg>New<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- filter chips -->\n      <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:16px;flex-wrap:wrap;\">\n        <button class=\"chip on\" data-filter=\"all\">All <span class=\"n\">3,248<\u002Fspan><\u002Fbutton>\n        <button class=\"chip\" data-filter=\"review\">Needs review <span class=\"n\">14<\u002Fspan><\u002Fbutton>\n        <button class=\"chip\" data-filter=\"highconf\">High confidence <span class=\"n\">1,902<\u002Fspan><\u002Fbutton>\n        <button class=\"chip\" data-filter=\"stale\">Stale &gt;30d <span class=\"n\">37<\u002Fspan><\u002Fbutton>\n        <span style=\"flex:1\"><\u002Fspan>\n        <span id=\"mem-count\" style=\"font-size:12.5px;color:#9ca3af;\">Showing 1–50 of 3,248 memories<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- table card -->\n      <div style=\"background:#fff;border:1px solid #e6e6ee;border-radius:14px;overflow:hidden;position:relative;\">\n                <div style=\"overflow-x:auto;\">\n        <table class=\"mtable\">\n          <thead>\n            <tr>\n              <th class=\"sortable\" data-sk=\"title\" style=\"padding-left:18px;\">Title<span class=\"sc\"><\u002Fspan><\u002Fth>\n              <th class=\"sortable\" data-sk=\"ns\" style=\"width:70px;\">NS<span class=\"sc\"><\u002Fspan><\u002Fth>\n              <th class=\"sortable mt-c\" data-sk=\"score\" style=\"width:64px;\">Score<span class=\"sc\"><\u002Fspan><\u002Fth>\n              <th class=\"sortable mt-r\" data-sk=\"conf\" style=\"width:60px;\">Conf<span class=\"sc\"><\u002Fspan><\u002Fth>\n              <th class=\"sortable mt-r\" data-sk=\"uses\" style=\"width:56px;\">Uses<span class=\"sc\"><\u002Fspan><\u002Fth>\n              <th class=\"sortable mt-r\" data-sk=\"links\" style=\"width:58px;\">Links<span c :5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;background:#f1f1f6;border-radius:999px;padding:4px 9px;\"><svg style=\"width:11px;height:11px\"><use href=\"#i-lock\"><\u002Fuse><\u002Fsvg>Read-only<\u002Fspan>\n          <span id=\"d-editing-badge\" style=\"display:none;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7c5cff;background:#f1edff;border-radius:999px;padding:4px 9px;\">Editing<\u002Fspan>\n          <button id=\"d-close\" style=\"border:none;background:transparent;color:#9ca3af;font-size:16px;padding:6px;border-radius:7px;cursor:pointer;line-height:1;\"><svg style=\"width:16px;height:16px\"><use href=\"#i-x\"><\u002Fuse><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- read-only stats (both modes) -->\n      <div id=\"d-meta\" style=\"display:flex;gap:7px;flex-wrap:wrap;margin:16px 0 4px;\"><\u002Fdiv>\n\n      <div style=\"display:flex;gap:14px;\">\n        <div style=\"flex:1;\"><div class=\"d-lbl\">Namespace<\u002Fdiv>\n          <select id=\"d-ns-edit\" class=\"d-fld\" disabled=\"\" style=\"appearance:none;-webkit-appearance:none;\">\n            <option value=\"default\">default<\u002Foption><option value=\"dev\">dev<\u002Foption><option value=\"infra\">infra<\u002Foption><option value=\"archive\">archive<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div style=\"width:120px;flex-shrink:0;\"><div class=\"d-lbl\">Score<\u002Fdiv>\n          <input id=\"d-score-edit\" class=\"d-fld d-num\" type=\"number\" min=\"0\" max=\"10\" step=\"0.1\" readonly=\"\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"d-lbl\">Description<\u002Fdiv>\n      <textarea id=\"d-desc-edit\" class=\"d-fld\" readonly=\"\" rows=\"2\"><\u002Ftextarea>\n      <div class=\"d-lbl\">Content<\u002Fdiv>\n      <textarea id=\"d-content-edit\" class=\"d-fld\" readonly=\"\" rows=\"4\"><\u002Ftextarea>\n\n      <!-- danger zone (edit only) -->\n      <div id=\"d-danger\" style=\"display:none;margin-top:24px;padding-top:20px;border-top:1px solid #eeeef3;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n          <div style=\"min-width:0;\">\n            <div style=\"font-size:13px;font-weight:600;color:#1a1a2e;\">Delete this memory<\u002Fdiv>\n            <div style=\"font-size:12px;color:#9ca3af;margin-top:2px;line-height:1.45;\">Soft-delete is recoverable from the deleted view. Permanent delete can't be undone.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-shrink:0;\">\n            <button id=\"d-soft\" style=\"border:1px solid #e6e6ee;background:#fff;border-radius:8px;padding:8px 13px;font-size:12.5px;font-weight:500;color:#3f3f52;cursor:pointer;display:inline-flex;align-items:center;gap:6px;\"><svg style=\"width:14px;height:14px;color:#9ca3af\"><use href=\"#i-archive\"><\u002Fuse><\u002Fsvg>Soft-delete<\u002Fbutton>\n            <button id=\"d-hard\" data-confirm=\"hard\" style=\"border:1px solid #f0c9c9;background:#fff;border-radius:8px;padding:8px 13px;font-size:12.5px;font-weight:600;color:#dc2626;cursor:pointer;display:inline-flex;align-items:center;gap:6px;\"><svg style=\"width:14px;height:14px\"><use href=\"#i-trash\"><\u002Fuse><\u002Fsvg>Delete<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- footer -->\n      <div style=\"display:flex;gap:8px;margin-top:24px;padding-top:16px;border-top:1px solid #eeeef3;\">\n        <div id=\"d-foot-view\" style=\"display:flex;gap:8px;width:100%;\">\n          <button data-toast=\"Copied memory ID to clipboard.\" style=\"border:1px solid #e6e6ee;background:#fff;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;color:#3f3f52;cursor:pointer;\">Copy ID<\u002Fbutton>\n          <span style=\"flex:1\"><\u002Fspan>\n          <button id=\"d-edit-btn\" style=\"border:none;background:#7c5cff;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:7px;\"><svg style=\"width:14px;height:14px\"><use href=\"#i-edit\"><\u002Fuse><\u002Fsvg>Edit memory<\u002Fbutton>\n        <\u002Fdiv>\n        <div id=\"d-foot-edit\" style=\"display:none;gap:8px;width:100%;\">\n          <button id=\"d-cancel\" style=\"border:1px solid #e6e6ee;background:#fff;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;color:#1a1a2e;cursor:pointer;\">Cancel<\u002Fbutton>\n          <span style=\"flex:1\"><\u002Fspan>\n          <button id=\"d-save\" style=\"border:none;background:#7c5cff;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:7px;\"><svg style=\"width:14px;height:14px\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg>Save changes<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- confirm dialog -->\n  <div id=\"cf-scrim\" style=\"position:fixed;inset:0;background:rgba(20,20,35,.4);opacity:0;pointer-events:none;transition:opacity .16s;z-index:70;display:flex;align-items:center;justify-content:center;padding:20px;\">\n    <div id=\"cf-box\" style=\"width:400px;max-width:100%;background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(20,20,40,.28);padding:24px;transform:translateY(8px);transition:transform .16s;\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\">\n        <span id=\"cf-ic\" style=\"width:38px;height:38px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg style=\"width:19px;height:19px\"><use href=\"#i-trash\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n        <div id=\"cf-title\" style=\"font-size:16px;font-weight:700;color:#1a1a2e;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"cf-body\" style=\"font-size:13px;line-height:1.55;color:#6b7280;\"><\u002Fdiv>\n      <div id=\"cf-name\" style=\"font-size:13px;font-weight:600;color:#1a1a2e;background:#f6f6f9;border:1px solid #ececf3;border-radius:8px;padding:9px 12px;margin-top:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\"><\u002Fdiv>\n      <div style=\"display:flex;gap:8px;margin-top:20px;\">\n        <button id=\"cf-cancel\" style=\"flex:1;border:1px solid #e6e6ee;background:#fff;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:500;color:#1a1a2e;cursor:pointer;\">Cancel<\u002Fbutton>\n        <button id=\"cf-ok\" style=\"flex:1;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;\">Delete<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  componentDidMount(){ this.wire(); }\n  toast(msg){\n    const t=document.createElement('div');t.textContent=msg;\n    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:11px 20px;border-radius:9px;font:600 13px/1 -apple-system,system-ui,sans-serif;box-shadow:0 10px 28px rgba(0,0,0,.22);z-index:200;opacity:0;transition:opacity .16s;';\n    document.body.appendChild(t);requestAnimationFrame(()=>t.style.opacity='1');\n    setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),220);},1800);\n  }\n  wire(){\n    const root=document.getElementById('mem-root'); if(!root||this._w) return; this._w=true;\n    const self=this;\n    root.querySelectorAll('[data-toast]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();self.toast(b.getAttribute('data-toast'));}));\n\n    const rows=[...root.querySelectorAll('#mem-body tr')];\n    rows.forEach(r=>r.addEventListener('click',()=>self.openDrawer(r)));\n\n    // filter chips\n    root.querySelectorAll('.chip[data-filter]').forEach(c=>c.addEventListener('click',()=>{\n      root.querySelectorAll('.chip[data-filter]').forEach(x=>x.classList.remove('on')); c.classList.add('on');\n      const f=c.getAttribute('data-filter'); let shown=0;\n      rows.forEach(r=>{\n        let ok=true;\n        if(f==='review') ok=+r.dataset.conf<70;\n        else if(f==='highconf') ok=+r.dataset.conf>=85;\n        else if(f==='stale') ok=r.dataset.stale==='1';\n        r.style.display=ok?'':'none'; if(ok)shown++;\n      });\n      root.querySelector('#mem-count').textContent=shown+' of 3,248 memories';\n    }));\n\n    // pagination (50 per page)\n    const per=50, totalItems=3248, pageCount=Math.ceil(totalItems/per);\n    let page=1;\n    const pagesWrap=root.querySelector('#mem-pages');\n    const renderPager=()=>{\n      const start=(page-1)*per+1, end=Math.min(page*per,totalItems);\n      root.querySelector('#mem-range').textContent=start+'–'+end+' of '+totalItems.toLocaleString();\n      const cnt=root.querySelector('#mem-count'); if(cnt) cnt.textContent='Showing '+start+'–'+end+' of '+totalItems.toLocaleString()+' memories';\n      pagesWrap.innerHTML='<span style=\"font-size:13px;color:#3f3f52;white-space:nowrap;\">Page <strong style=\"font-weight:600;\">'+page+'<\u002Fstrong> of '+pageCount+'<\u002Fspan>';\n      root.querySelectorAll('.pg-nav').forEach(b=>{\n        const step=+b.dataset.step, disabled=(step<0&&page===1)||(step>0&&page===pageCount);\n        b.style.cursor=disabled?'not-allowed':'pointer'; b.style.color=disabled?'#c2c2cf':'#3f3f52';\n        b.onclick=()=>{ if(disabled)return; page=Math.min(pageCount,Math.max(1,page+step)); renderPager(); };\n      });\n    };\n    renderPager();\n\n    // column sorting\n    const body=root.querySelector('#mem-body');\n    const parseUpdated=t=>{ const m=/(\\d+)\\s*([hdmw])/.exec(t||''); if(!m) return 0; const n=+m[1]; const u=m[2]; return n*(u==='m'?1/60:u==='h'?1:u==='d'?24:u==='w'?168:1); };\n    const sortVal=(r,k)=>{\n      if(k==='title') return r.children[0].textContent.trim().toLowerCase();\n      if(k==='ns') return (r.dataset.ns||'').toLowerCase();\n      if(k==='updated') return parseUpdated(r.dataset.updated);\n      return parseFloat(r.dataset[k]||0)||0;\n    };\n    let sortKey=null, sortDir=1;\n    const headers=[...root.querySelectorAll('.mtable th.sortable')];\n    const applySort=()=>{\n      headers.forEach(h=>{\n        const on=h.dataset.sk===sortKey; h.classList.toggle('sorted',on);\n        const c=h.querySelector('.sc'); if(c) c.textContent=on?(sortDir>0?'▲':'▼'):'';\n        h.style.color=on?'#7c5cff':'';\n      });\n      const rows=[...body.querySelectorAll('tr')];\n      const txt=(sortKey==='title'||sortKey==='ns');\n      rows.sort((a,b)=>{ const va=sortVal(a,sortKey),vb=sortVal(b,sortKey); return (txt?String(va).localeCompare(String(vb)):va-vb)*sortDir; });\n      rows.forEach(r=>body.appendChild(r));\n    };\n    headers.forEach(h=>h.addEventListener('click',()=>{\n      const k=h.dataset.sk;\n      if(sortKey===k){ sortDir*=-1; } else { sortKey=k; sortDir=(k==='title'||k==='ns')?1:-1; }\n      applySort();\n    }));\n\n    // drawer close + edit-mode toggle\n    root.querySelector('#d-close').addEventListener('click',()=>self.closeDrawer());\n    root.querySelector('#mem-scrim').addEventListener('click',()=>self.closeDrawer());\n    root.querySelector('#d-edit-btn').addEventListener('click',()=>self.setMode(true));\n    root.querySelector('#d-cancel').addEventListener('click',()=>{ if(self._row) self.openDrawer(self._row); else self.setMode(false); });\n    root.querySelector('#d-save').addEventListener('click',()=>{ self.setMode(false); self.toast('Memory saved'); });\n    ['#d-desc-edit','#d-content-edit'].forEach(s=>{ const el=root.querySelector(s); if(el) el.addEventListener('input',()=>self.autosize(el)); });\n    // soft-delete acts immediately; hard delete confirms\n    root.querySelector('#d-soft').addEventListener('click',()=>{ self.closeDrawer(); self.toast('Memory soft-deleted.'); });\n    root.querySelectorAll('#mem-drawer [data-confirm]').forEach(b=>b.addEventListener('click',()=>self.confirmDelete(b.getAttribute('data-confirm'))));\n    root.querySelector('#cf-cancel').addEventListener('click',()=>self.closeConfirm());\n    root.querySelector('#cf-scrim').addEventListener('click',e=>{ if(e.target===root.querySelector('#cf-scrim')) self.closeConfirm(); });\n\n    // deep-link: open a memory drawer when arriving via ?mem=<title>\n    try{\n      const p=new URLSearchParams(location.search).get('mem');\n      if(p){\n        const target=decodeURIComponent(p).trim().toLowerCase();\n        const row=rows.find(r=>r.children[0].textContent.trim().toLowerCase()===target);\n        if(row) self.openDrawer(row);\n      }\n    }catch(e){}\n  }\n  autosize(el){ if(!el) return; el.style.height='auto'; el.style.height=(el.scrollHeight)+'px'; }\n  setFieldsEditable(edit){\n    const root=document.getElementById('mem-root');\n    const flds=[...root.querySelectorAll('#mem-drawer .d-fld')];\n    flds.forEach(el=>{\n      if(edit){ el.removeAttribute('readonly'); }\n      else { el.setAttribute('readonly','readonly'); }\n      const isTitle=el.classList.contains('d-title-fld');\n      if(isTitle){\n        // title stays a heading in view, becomes a boxed field in edit\n        el.style.border=edit?'1px solid #e6e6ee':'1px solid transparent';\n        el.style.background=edit?'#fff':'transparent';\n        el.style.padding=edit?'8px 12px':'0';\n        el.style.color='#1a1a2e'; el.style.webkitTextFillColor='#1a1a2e';\n        el.style.cursor=edit?'text':'default';\n      } else {\n        // other fields: disabled-looking box in view, active box in edit\n        el.style.border=edit?'1px solid #e6e6ee':'1px solid #ececf3';\n        el.style.background=edit?'#fff':'#f6f6f9';\n        el.style.padding='10px 12px';\n        el.style.color=edit?'#1a1a2e':'#8a8a99';\n        el.style.webkitTextFillColor=edit?'#1a1a2e':'#8a8a99';\n        el.style.cursor=edit?(el.tagName==='SELECT'?'pointer':'text'):'default';\n      }\n    });\n    const ns=root.querySelector('#d-ns-edit'); if(ns){ ns.disabled=!edit; ns.style.backgroundImage=edit?'linear-gradient(45deg,transparent 50%,#9ca3af 50%),linear-gradient(135deg,#9ca3af 50%,transparent 50%)':'none'; ns.style.backgroundPosition='calc(100% - 16px) center,calc(100% - 11px) center'; ns.style.backgroundSize='5px 5px,5px 5px'; ns.style.backgroundRepeat='no-repeat'; }\n    root.querySelectorAll('#mem-drawer .d-lbl').forEach(l=>l.style.paddingLeft='0');\n  }\n  setMode(edit){\n    const root=document.getElementById('mem-root'), drawer=root.querySelector('#mem-drawer');\n    drawer.classList.toggle('editing',edit);\n    root.querySelector('#d-editing-badge').style.display=edit?'inline-flex':'none';\n    root.querySelector('#d-readonly-badge').style.display=edit?'none':'inline-flex';\n    root.querySelector('#d-danger').style.display=edit?'block':'none';\n    root.querySelector('#d-foot-view').style.display=edit?'none':'flex';\n    root.querySelector('#d-foot-edit').style.display=edit?'flex':'none';\n    this.setFieldsEditable(edit);\n    ['#d-desc-edit','#d-content-edit'].forEach(s=>this.autosize(root.querySelector(s)));\n    if(edit) root.querySelector('#d-title-edit').focus();\n  }\n  openDrawer(r){\n    const root=document.getElementById('mem-root');\n    this._row=r;\n    root.querySelector('#d-title-edit').value=r.children[0].textContent;\n    root.querySelector('#d-desc-edit').value=r.dataset.desc;\n    root.querySelector('#d-content-edit').value=r.dataset.content;\n    root.querySelector('#d-score-edit').value=r.dataset.score;\n    root.querySelector('#d-ns-edit').value=r.dataset.ns;\n    const chip=(l,v)=>`<span style=\"background:#f1f1f6;border-radius:999px;padding:4px 10px;font-size:11px;color:#6b7280;\">${l}: <strong style=\"color:#1a1a2e;font-weight:600;\">${v}<\u002Fstrong><\u002Fspan>`;\n    root.querySelector('#d-meta').innerHTML=chip('conf',r.dataset.conf+'%')+chip('uses',r.dataset.uses)+chip('links',r.dataset.links)+chip('updated',r.dataset.updated);\n    this.setMode(false);\n    root.querySelector('#mem-drawer').classList.add('open');\n    root.querySelector('#mem-scrim').classList.add('open');\n    // fit textareas once visible\n    requestAnimationFrame(()=>{ ['#d-desc-edit','#d-content-edit'].forEach(s=>this.autosize(root.querySelector(s))); });\n  }\n  closeDrawer(){\n    const root=document.getElementById('mem-root');\n    root.querySelector('#mem-drawer').classList.remove('open');\n    root.querySelector('#mem-scrim').classList.remove('open');\n    this.setMode(false);\n  }\n  confirmDelete(kind){\n    const root=document.getElementById('mem-root'), self=this;\n    const name=root.querySelector('#d-title-edit').value||'this memory';\n    const soft=kind==='soft';\n    root.querySelector('#cf-title').textContent=soft?'Soft-delete memory?':'Delete permanently?';\n    root.querySelector('#cf-body').innerHTML=soft\n      ? 'It will be hidden from search but stays recoverable from the deleted view.'\n      : 'This removes the memory and all its links for good. <strong style=\"color:#b91c1c;\">This cannot be undone.<\u002Fstrong>';\n    root.querySelector('#cf-name').textContent=name;\n    const ic=root.querySelector('#cf-ic'), ok=root.querySelector('#cf-ok');\n    ic.style.background=soft?'#f1f1f6':'#fef2f2';\n    ic.style.color=soft?'#6b7280':'#dc2626';\n    ic.querySelector('use').setAttribute('href',soft?'#i-archive':'#i-trash');\n    ok.style.background=soft?'#1a1a2e':'#dc2626';\n    ok.textContent=soft?'Soft-delete':'Delete permanently';\n    const okClone=ok.cloneNode(true); ok.parentNode.replaceChild(okClone,ok);\n    okClone.addEventListener('click',()=>{ self.closeConfirm(); self.closeDrawer(); self.toast(soft?'Memory soft-deleted.':'Memory permanently deleted.'); });\n    const sc=root.querySelector('#cf-scrim'); sc.style.pointerEvents='auto'; sc.style.opacity='1';\n    root.querySelector('#cf-box').style.transform='translateY(0)';\n  }\n  closeConfirm(){\n    const root=document.getElementById('mem-root'), sc=root.querySelector('#cf-scrim');\n    sc.style.opacity='0'; sc.style.pointerEvents='none';\n    root.querySelector('#cf-box').style.transform='translateY(8px)';\n  }\n  renderVals(){ return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
