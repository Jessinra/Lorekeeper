document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x\"><use href=\"#i-pgr\"><\u002Fuse><\u002Fsvg><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- detail drawer (suggestion link / stale memory) -->\n  <div id=\"rv-scrim\" class=\"rv-scrim\"><\u002Fdiv>\n  <div id=\"rv-drawer\" class=\"rv-drawer\">\n    <div style=\"padding:24px 26px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid #eeeef3;\">\n        <div id=\"rv-dtitle\" style=\"font-size:15px;font-weight:700;\">Details<\u002Fdiv>\n        <button id=\"rv-close\" style=\"border:none;background:transparent;color:#9ca3af;padding:6px;border-radius:7px;cursor:pointer;flex-shrink:0;\"><svg style=\"width:16px;height:16px\"><use href=\"#i-x\"><\u002Fuse><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"rv-body\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:700}}\">\nclass Component extends DCLogic {\n  componentDidMount(){ this.wire(); }\n  toast(msg){\n    const t=document.createElement('div');t.textContent=msg;\n    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:11px 20px;border-radius:9px;font:600 13px/1 -apple-system,system-ui,sans-serif;box-shadow:0 10px 28px rgba(0,0,0,.22);z-index:200;opacity:0;transition:opacity .16s;';\n    document.body.appendChild(t);requestAnimationFrame(()=>t.style.opacity='1');\n    setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),220);},1800);\n  }\n  data(){\n    const relC={references:'#d97706',contradicts:'#dc2626',supersedes:'#7c5cff',duplicate_of:'#92400e',used_by:'#16a34a'};\n    const S=[\n      ['Redis caching strategy for search results','references','MCP transport handshake timeout patterns',9.1,'2h'],\n      ['Concurrent agent session handling','references','Token bucket vs fixed window comparison',8.4,'2h'],\n      ['Command palette fuzzy match scoring','used_by','API rate limiting patterns for concurrent agents',8.8,'5h'],\n      ['FastAPI middleware ordering rules','references','Vector embedding cache invalidation logic',7.7,'5h'],\n      ['Local Redis config for cache warmup','references','Redis caching strategy for search results',7.4,'8h'],\n      ['Backup rotation script maintenance','references','Namespace strategy for multi-tenant memories',7.1,'8h'],\n      ['API rate limiting patterns for concurrent agents','contradicts','Token bucket vs fixed window comparison',6.5,'11h'],\n      ['Review inbox triage pattern notes','references','Command palette fuzzy match scoring',6.2,'13h'],\n      ['Namespace strategy for multi-tenant memories','supersedes','Lorekeeper sweep engine confidence floor',5.9,'1d'],\n      ['Graph layout node sizing logic','references','Suggestion sweep accuracy audit notes',5.1,'1d'],\n      ['Old spike: GraphQL gateway for aggregation','duplicate_of','FastAPI middleware ordering rules',3.2,'2d'],\n      ['Team onboarding checklist','references','Project conventions file — v3',2.6,'2d'],\n    ].map((a,i)=>({id:'s'+i,source:a[0],rel:a[1],target:a[2],score:a[3],age:a[4],_i:i}));\n    const ST=[\n      ['Vector embedding cache invalidation logic','infra',5.8,31],\n      ['Team onboarding checklist','default',5.2,34],\n      ['Suggestion sweep accuracy audit notes','default',5.9,37],\n      ['Namespace strategy for multi-tenant memories','archive',6.7,41],\n      ['Local Redis config for cache warmup','infra',8.1,44],\n      ['Graph layout node sizing logic','dev',6.4,52],\n      ['Project conventions file — v3','default',7.5,63],\n      ['Old spike: GraphQL gateway for aggregation','archive',2.1,120],\n    ].map((a,i)=>({id:'st'+i,title:a[0],ns:a[1],score:a[2],idle:a[3],_i:i}));\n    const mem=(ns,score,desc,content)=>({ns,score,desc,content});\n    this.MEM={\n      'API rate limiting patterns for concurrent agents':mem('default',9.2,'Token-bucket based limiter shared across agent sessions hitting the same MCP tool.','Use a token bucket keyed by (agent_id, tool_name). Refill rate should track the tool\\u2019s upstream rate limit, not a fixed global value. Falls back to fixed-window when Redis is unavailable.'),\n      'Redis caching strategy for search results':mem('default',7.1,'TTL + cosine-similarity cache key for hybrid search responses.','Cache key is a hash of (query embedding rounded to 3dp, namespace, min_score). TTL 10 minutes. Invalidate on any memory update within that namespace.'),\n      'MCP transport handshake timeout patterns':mem('infra',7.9,'Handshake retries and backoff for stdio/SSE transports.','First attempt: 2s timeout. Backoff x1.8 up to 3 retries. Log a warning (not error) on retry 1-2; escalate to error on final failure.'),\n      'Token bucket vs fixed window comparison':mem('dev',8.4,'Benchmark notes comparing the two rate-limit strategies under bursty load.','Token bucket smooths bursts better; fixed window is simpler but allows 2x burst at window boundaries. Chose token bucket for the MCP gateway.'),\n      'FastAPI middleware ordering rules':mem('dev',6.9,'Order matters: auth before rate-limit, rate-limit before logging.','Middleware stack (outer to inner): CORS \\u2192 Auth \\u2192 RateLimit \\u2192 RequestLogging \\u2192 route handlers. RateLimit before Auth leaks limiter state to unauthenticated callers.'),\n      'Vector embedding cache invalidation logic':mem('infra',5.8,'When to recompute embeddings vs reuse cached vectors.','Recompute only if content or title changed. Description-only edits reuse the existing embedding to save cost, flagged with embedding_stale=false.'),\n      'Concurrent agent session handling':mem('default',6.2,'Isolating memory writes when multiple agents share a namespace.','Each session gets a write-ahead buffer; commits are serialized per namespace to avoid duplicate auto-link races.'),\n      'Local Redis config for cache warmup':mem('infra',8.1,'Docker compose snippet + warmup script.','maxmemory 512mb, maxmemory-policy allkeys-lru. Warmup script preloads the top 200 memories by usage_count on boot.'),\n      'Project conventions file \\u2014 v3':mem('default',7.5,'House style for this repo.','Prefer composition over inheritance. No default exports. Tests colocated with source.'),\n      'Team onboarding checklist':mem('default',5.2,'First-week setup steps for new engineers.','1. Clone repo. 2. Run setup.sh. 3. Request DB access. 4. Pair on first PR.'),\n      'Namespace strategy for multi-tenant memories':mem('archive',6.7,'Superseded by per-tenant DB approach.','Originally namespaced by prefix string; replaced because prefix collisions caused cross-tenant leakage risk.'),\n      'Command palette fuzzy match scoring':mem('dev',8.7,'Scoring function for the \\u2318K search.','Score = 0.6*prefix_match + 0.3*subsequence_match + 0.1*recency. Case-insensitive, diacritic-insensitive.'),\n      'Lorekeeper sweep engine confidence floor':mem('default',7.3,'Minimum weighted_score before a link suggestion surfaces in the Review inbox.','Floor is 0.75 weighted_score by default (auto_link_threshold). Lower floors flood the review queue with noise.'),\n      'Graph layout node sizing logic':mem('dev',6.4,'Node radius scales with usage_count, capped.','radius = 8 + min(usage_count, 40) * 0.35. Prevents mega-hub nodes from dominating the layout.'),\n      'Suggestion sweep accuracy audit notes':mem('default',5.9,'Sampled 50 accepted links, 6 were judged wrong in hindsight.','Most false positives were references mislabeled where contradicts was more accurate.'),\n      'Backup rotation script maintenance':mem('infra',8.9,'Keeps last 14 daily backups, prunes older.','Runs at 03:00 local time via cron. Uses the /api/export endpoint internally, same format as manual export.'),\n      'Review inbox triage pattern notes':mem('dev',7.6,'Keyboard-first triage beats mouse-only for >20 items/day.','Y/N shortcuts cut average triage time per suggestion from ~9s to ~3s in informal testing.'),\n      'Old spike: GraphQL gateway for aggregation':mem('archive',2.1,'Abandoned \\u2014 REST + BFF pattern was simpler for this scale.','Kept for historical context only; do not resurrect without re-checking whether N+1 query issues were ever solved.'),\n    };\n    this.nsC={default:'#7c5cff',dev:'#16a34a',infra:'#9ca3af',archive:'#d97706'};\n    this.relC=relC; this.S=S; this.ST=ST;\n    this.sortS={k:'score',dir:-1}; this.sortST={k:'idle',dir:-1};\n    this.sTotal=5284; this.stTotal=37; this.per=50;\n  }\n  sortList(list,st){\n    const k=st.k,dir=st.dir;\n    const val=(x)=>{ if(k==='source')return x.source.toLowerCase(); if(k==='target')return x.target.toLowerCase(); if(k==='rel')return x.rel; if(k==='title')return x.title.toLowerCase(); if(k==='ns')return x.ns; if(k==='newest')return x._i; return x[k]; };\n    const txt=['source','target','rel','title','ns'].includes(k);\n    return [...list].sort((a,b)=>{const va=val(a),vb=val(b);return (txt?String(va).localeCompare(String(vb)):va-vb)*dir;});\n  }\n  markHeaders(view,st){\n    const root=document.getElementById('rev-root');\n    root.querySelectorAll('#'+view+' .mtable th.sortable').forEach(h=>{\n      const on=h.dataset.sk===st.k; h.classList.toggle('sorted',on);\n      const c=h.querySelector('.sc'); if(c) c.textContent=on?(st.dir>0?'▲':'▼'):''; h.style.color=on?'#7c5cff':'';\n    });\n  }\n  renderSugg(){\n    const root=document.getElementById('rev-root'), relC=this.relC, self=this;\n    let list=this.sortList(this.S,this.sortS);\n    this.markHeaders('view-sugg',this.sortS);\n    root.querySelector('#s-body').innerHTML=list.map(x=>{\n      const sc=x.score>=7?['#ecfdf3','#16a34a']:x.score>=5?['#fef6e7','#d97706']:['#fef2f2','#dc2626'];\n      return `<tr data-id=\"${x.id}\"><td style=\"padding-left:18px;\"><input class=\"cbx s-cb\" type=\"checkbox\"><\u002Ftd>`+\n        `<td style=\"font-weight:500;\">${x.source}<\u002Ftd>`+\n        `<td><span class=\"relpill\" style=\"background:#f1f1f6;color:${relC[x.rel]};\">${x.rel}<\u002Fspan><\u002Ftd>`+\n        `<td style=\"font-weight:500;\">${x.target}<\u002Ftd>`+\n        `<td><span style=\"background:${sc[0]};color:${sc[1]};border-radius:6px;padding:2px 8px;font-weight:600;font-size:12px;\">${x.score.toFixed(1)}<\u002Fspan><\u002Ftd>`+\n        `<td style=\"text-align:right;padding-right:16px;overflow:visible;\"><span style=\"display:inline-flex;gap:6px;\"><button class=\"iconb acc sm\" data-acc=\"${x.id}\" title=\"Accept\"><svg style=\"width:14px;height:14px\"><use href=\"#i-check\"/><\u002Fsvg><\u002Fbutton><button class=\"iconb rej sm\" data-rej=\"${x.id}\" title=\"Reject\"><svg style=\"width:14px;height:14px\"><use href=\"#i-x\"/><\u002Fsvg><\u002Fbutton><\u002Fspan><\u002Ftd><\u002Ftr>`;\n    }).join('');\n    root.querySelectorAll('#s-body .s-cb').forEach(cb=>{ cb.addEventListener('click',e=>e.stopPropagation()); cb.addEventListener('change',()=>{ cb.closest('tr').classList.toggle('sel',cb.checked); self.selSugg(); }); });\n    root.querySelectorAll('#s-body [data-acc]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); self.removeSugg([b.dataset.acc]); self.toast('Link accepted.'); }));\n    root.querySelectorAll('#s-body [data-rej]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); self.removeSugg([b.dataset.rej]); self.toast('Suggestion rejected.'); }));\n    root.querySelectorAll('#s-body tr').forEach(tr=>tr.addEventListener('click',()=>self.openSugg(tr.dataset.id)));\n    this.selSugg();\n    this.pager('s', this.sTotal);\n  }\n  selSugg(){\n    const root=document.getElementById('rev-root');\n    const cbs=[...root.querySelectorAll('#s-body .s-cb')], sel=cbs.filter(c=>c.checked).length;\n    root.querySelector('#s-all').checked=cbs.length>0&&sel===cbs.length;\n    root.querySelector('#s-bulk').style.display=sel?'inline-flex':'none';\n    root.querySelector('#s-selinfo').style.display=sel?'none':'flex';\n    root.querySelector('#s-selcount').textContent=sel+' selected';\n  }\n  removeSugg(ids){\n    this.S=this.S.filter(x=>!ids.includes(x.id));\n    this.sTotal=Math.max(0,this.sTotal-ids.length);\n    document.getElementById('rev-root').querySelector('#b-sugg').textContent=this.sTotal.toLocaleString();\n    document.getElementById('rev-root').querySelector('#s-count').innerHTML='<strong style=\"color:#1a1a2e;font-weight:600;\">'+this.sTotal.toLocaleString()+'<\u002Fstrong> pending suggestions';\n    this.renderSugg();\n  }\n  renderStale(){\n    const root=document.getElementById('rev-root'), nsC={default:'#7c5cff',dev:'#16a34a',infra:'#9ca3af',archive:'#d97706'}, self=this;\n    let list=this.sortList(this.ST,this.sortST);\n    this.markHeaders('view-stale',this.sortST);\n    root.querySelector('#st-body').innerHTML=list.map(x=>{\n      const sc=x.score>=7?['#ecfdf3','#16a34a']:x.score>=5?['#fef6e7','#d97706']:['#fef2f2','#dc2626'];\n      return `<tr data-id=\"${x.id}\"><td style=\"padding-left:18px;\"><input class=\"cbx st-cb\" type=\"checkbox\"><\u002Ftd>`+\n        `<td style=\"font-weight:500;\">${x.title}<\u002Ftd>`+\n        `<td><span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:${nsC[x.ns]}\"><\u002Fspan><span style=\"font-size:11.5px;color:#9ca3af;\">${x.ns}<\u002Fspan><\u002Fspan><\u002Ftd>`+\n        `<td><span style=\"background:${sc[0]};color:${sc[1]};border-radius:6px;padding:2px 8px;font-weight:600;font-size:12px;\">${x.score.toFixed(1)}<\u002Fspan><\u002Ftd>`+\n        `<td style=\"color:#9ca3af;\">${x.idle}d ago<\u002Ftd>`+\n        `<td style=\"text-align:right;padding-right:16px;overflow:visible;\"><span style=\"display:inline-flex;gap:6px;\"><button class=\"tbtn\" data-refresh=\"${x.id}\" style=\"padding:5px 10px;\"><svg style=\"width:13px;height:13px;color:#6b7280\"><use href=\"#i-refresh\"/><\u002Fsvg>Refresh<\u002Fbutton><button class=\"iconb rej sm\" data-del=\"${x.id}\" title=\"Delete\"><svg style=\"width:14px;height:14px\"><use href=\"#i-trash\"/><\u002Fsvg><\u002Fbutton><\u002Fspan><\u002Ftd><\u002Ftr>`;\n    }).join('');\n    root.querySelectorAll('#st-body .st-cb').forEach(cb=>{ cb.addEventListener('click',e=>e.stopPropagation()); cb.addEventListener('change',()=>{ cb.closest('tr').classList.toggle('sel',cb.checked); self.selStale(); }); });\n    root.querySelectorAll('#st-body [data-refresh]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); self.refreshStale([b.dataset.refresh]); }));\n    root.querySelectorAll('#st-body [data-del]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); self.removeStale([b.dataset.del]); self.toast('Memory deleted.'); }));\n    root.querySelectorAll('#st-body tr').forEach(tr=>tr.addEventListener('click',()=>self.openStale(tr.dataset.id)));\n    this.selStale();\n    this.pager('st', this.stTotal);\n  }\n  selStale(){\n    const root=document.getElementById('rev-root');\n    const cbs=[...root.querySelectorAll('#st-body .st-cb')], sel=cbs.filter(c=>c.checked).length;\n    root.querySelector('#st-all').checked=cbs.length>0&&sel===cbs.length;\n    root.querySelector('#st-bulk').style.display=sel?'inline-flex':'none';\n    root.querySelector('#st-selcount').textContent=sel+' selected';\n  }\n  refreshStale(ids){\n    // \"refresh\" = mark used today: drop from the stale list\n    this.ST=this.ST.filter(x=>!ids.includes(x.id));\n    this.stTotal=Math.max(0,this.stTotal-ids.length);\n    this.updateStaleCount();\n    this.renderStale();\n    this.toast(ids.length>1?ids.length+' memories refreshed.':'Memory refreshed — marked used today.');\n  }\n  removeStale(ids){\n    this.ST=this.ST.filter(x=>!ids.includes(x.id));\n    this.stTotal=Math.max(0,this.stTotal-ids.length);\n    this.updateStaleCount();\n    this.renderStale();\n  }\n  updateStaleCount(){\n    const root=document.getElementById('rev-root');\n    root.querySelector('#b-stale').textContent=this.stTotal;\n    root.querySelector('#st-count').innerHTML='<strong style=\"color:#1a1a2e;font-weight:600;\">'+this.stTotal+'<\u002Fstrong> memories unused in the past 30 days';\n  }\n  pager(tbl,total){\n    const root=document.getElementById('rev-root'), per=this.per, pageCount=Math.max(1,Math.ceil(total/per));\n    let page=this['_pg_'+tbl]||1; if(page>pageCount)page=pageCount; this['_pg_'+tbl]=page;\n    const start=total?((page-1)*per+1):0, end=Math.min(page*per,total);\n    root.querySelector('#'+tbl+'-range').textContent=start+'–'+end+' of '+total.toLocaleString();\n    root.querySelector('#'+tbl+'-pages').innerHTML='<span style=\"font-size:13px;color:#3f3f52;white-space:nowrap;\">Page <strong style=\"font-weight:600;\">'+page+'<\u002Fstrong> of '+pageCount+'<\u002Fspan>';\n    root.querySelectorAll('.pg-nav[data-tbl=\"'+tbl+'\"]').forEach(b=>{\n      const step=+b.dataset.step, disabled=(step<0&&page===1)||(step>0&&page===pageCount);\n      b.style.cursor=disabled?'not-allowed':'pointer'; b.style.color=disabled?'#c2c2cf':'#3f3f52';\n      b.onclick=()=>{ if(disabled)return; this['_pg_'+tbl]=Math.min(pageCount,Math.max(1,page+step)); this.pager(tbl,total); };\n    });\n  }\n  wire(){\n    const root=document.getElementById('rev-root'); if(!root||this._w) return; this._w=true;\n    const self=this;\n    this.data();\n    this.renderSugg();\n    this.renderStale();\n    // tab toggle\n    root.querySelectorAll('#rev-toggle button').forEach(b=>b.addEventListener('click',()=>{\n      root.querySelectorAll('#rev-toggle button').forEach(x=>x.classList.remove('on')); b.classList.add('on');\n      const v=b.dataset.view;\n      root.querySelector('#view-sugg').style.display=v==='sugg'?'':'none';\n      root.querySelector('#view-stale').style.display=v==='stale'?'':'none';\n    }));\n    // suggestions: select-all, bulk, sort\n    root.querySelector('#s-all').addEventListener('change',e=>{ root.querySelectorAll('#s-body .s-cb').forEach(cb=>{cb.checked=e.target.checked;cb.closest('tr').classList.toggle('sel',e.target.checked);}); self.selSugg(); });\n    root.querySelector('#s-acc').addEventListener('click',()=>{ const ids=self.selIds('s'); if(!ids.length)return; self.removeSugg(ids); self.toast(ids.length+' links accepted.'); });\n    root.querySelector('#s-rej').addEventListener('click',()=>{ const ids=self.selIds('s'); if(!ids.length)return; self.removeSugg(ids); self.toast(ids.length+' suggestions rejected.'); });\n    root.querySelector('#s-sort').addEventListener('change',e=>{ const v=e.target.value; self.sortS=v==='score-asc'?{k:'score',dir:1}:v==='newest'?{k:'newest',dir:1}:{k:'score',dir:-1}; self.renderSugg(); });\n    // stale: select-all, bulk, sort\n    root.querySelector('#st-all').addEventListener('change',e=>{ root.querySelectorAll('#st-body .st-cb').forEach(cb=>{cb.checked=e.target.checked;cb.closest('tr').classList.toggle('sel',e.target.checked);}); self.selStale(); });\n    root.querySelector('#st-refresh').addEventListener('click',()=>{ const ids=self.selIds('st'); if(ids.length) self.refreshStale(ids); });\n    root.querySelector('#st-del').addEventListener('click',()=>{ const ids=self.selIds('st'); if(!ids.length)return; self.removeStale(ids); self.toast(ids.length+' memories deleted.'); });\n    root.querySelector('#st-sort').addEventListener('change',e=>{ const v=e.target.value; self.sortST=v==='score-asc'?{k:'score',dir:1}:v==='score-desc'?{k:'score',dir:-1}:{k:'idle',dir:-1}; self.renderStale(); });\n    // header sorting\n    root.querySelectorAll('#view-sugg .mtable th.sortable').forEach(h=>h.addEventListener('click',()=>{ const k=h.dataset.sk; self.sortS={k,dir:self.sortS.k===k?-self.sortS.dir:(k==='score'?-1:1)}; self.renderSugg(); }));\n    root.querySelectorAll('#view-stale .mtable th.sortable').forEach(h=>h.addEventListener('click',()=>{ const k=h.dataset.sk; self.sortST={k,dir:self.sortST.k===k?-self.sortST.dir:(k==='score'||k==='idle'?-1:1)}; self.renderStale(); }));\n    // drawer close\n    root.querySelector('#rv-close').addEventListener('click',()=>self.closeDrawer());\n    root.querySelector('#rv-scrim').addEventListener('click',()=>self.closeDrawer());\n    // remaining toasts\n    root.querySelectorAll('[data-toast]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();self.toast(b.getAttribute('data-toast'));}));\n  }\n  selIds(tbl){ const root=document.getElementById('rev-root'); return [...root.querySelectorAll('#'+tbl+'-body .'+tbl+'-cb')].filter(c=>c.checked).map(c=>c.closest('tr').dataset.id); }\n  memCard(title,role){\n    const m=this.MEM[title]||{ns:'default',score:0,desc:'',content:''}, nsC=this.nsC;\n    const sc=m.score>=7?['#ecfdf3','#16a34a']:m.score>=5?['#fef6e7','#d97706']:['#fef2f2','#dc2626'];\n    return `<div style=\"border:1px solid #ececf3;border-radius:12px;padding:16px;\">`+\n      `<div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;margin-bottom:9px;\">${role}<\u002Fdiv>`+\n      `<div style=\"font-size:15px;font-weight:700;line-height:1.35;color:#1a1a2e;\">${title}<\u002Fdiv>`+\n      `<div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-top:11px;\">`+\n        `<span style=\"display:inline-flex;align-items:center;gap:6px;background:#f6f6f9;border-radius:999px;padding:4px 10px;font-size:11px;color:#6b7280;\"><span style=\"width:7px;height:7px;border-radius:50%;background:${nsC[m.ns]}\"><\u002Fspan>${m.ns}<\u002Fspan>`+\n        `<span style=\"background:${sc[0]};color:${sc[1]};border-radius:999px;padding:4px 10px;font-size:11px;font-weight:600;\">score ${m.score.toFixed(1)}<\u002Fspan>`+\n      `<\u002Fdiv>`+\n      `<div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#b0b0bd;margin:16px 0 5px;\">Description<\u002Fdiv>`+\n      `<div style=\"font-size:12.5px;line-height:1.55;color:#3f3f52;\">${m.desc}<\u002Fdiv>`+\n      `<div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#b0b0bd;margin:14px 0 5px;\">Content<\u002Fdiv>`+\n      `<div style=\"font-size:12.5px;line-height:1.55;color:#3f3f52;background:#f8f8fb;border:1px solid #f0f0f5;border-radius:8px;padding:10px 12px;\">${m.content}<\u002Fdiv>`+\n      `<\u002Fdiv>`;\n  }\n  openSugg(id){\n    const root=document.getElementById('rev-root'), x=this.S.find(r=>r.id===id); if(!x) return;\n    const relC=this.relC, self=this;\n    root.querySelector('#rv-dtitle').textContent='Suggested link';\n    root.querySelector('#rv-body').innerHTML=\n      `<div style=\"height:16px;\"><\u002Fdiv>`+\n      this.memCard(x.source,'Source')+\n      `<div style=\"display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 0;\"><svg style=\"width:20px;height:20px;color:#c2c2cf;transform:rotate(90deg)\"><use href=\"#i-arrow\"/><\u002Fsvg><span style=\"background:#f1f1f6;color:${relC[x.rel]};border-radius:999px;padding:4px 12px;font-size:12px;font-weight:600;\">${x.rel}<\u002Fspan><\u002Fdiv>`+\n      this.memCard(x.target,'Target')+\n      `<div style=\"display:flex;gap:10px;margin-top:18px;\">`+\n        `<div style=\"flex:1;background:#f8f8fb;border:1px solid #f0f0f5;border-radius:10px;padding:11px 14px;\"><div style=\"font-size:11px;color:#9ca3af;\">Suggestion score<\u002Fdiv><div style=\"font-size:18px;font-weight:700;color:#1a1a2e;margin-top:2px;\">${x.score.toFixed(1)}<\u002Fdiv><\u002Fdiv>`+\n        `<div style=\"flex:1;background:#f8f8fb;border:1px solid #f0f0f5;border-radius:10px;padding:11px 14px;\"><div style=\"font-size:11px;color:#9ca3af;\">Detected<\u002Fdiv><div style=\"font-size:18px;font-weight:700;color:#1a1a2e;margin-top:2px;\">${x.age} ago<\u002Fdiv><\u002Fdiv>`+\n      `<\u002Fdiv>`+\n      `<div style=\"display:flex;gap:8px;margin-top:20px;\">`+\n        `<button id=\"rv-acc\" class=\"selbar-btn\" style=\"flex:1;justify-content:center;background:#16a34a;color:#fff;padding:10px;\"><svg style=\"width:15px;height:15px\"><use href=\"#i-check\"/><\u002Fsvg>Accept link<\u002Fbutton>`+\n        `<button id=\"rv-rej\" class=\"selbar-btn\" style=\"flex:1;justify-content:center;background:#fff;color:#dc2626;border-color:#f0c9c9;padding:10px;\"><svg style=\"width:15px;height:15px\"><use href=\"#i-x\"/><\u002Fsvg>Reject<\u002Fbutton>`+\n      `<\u002Fdiv>`;\n    root.querySelector('#rv-acc').addEventListener('click',()=>{ self.closeDrawer(); self.removeSugg([id]); self.toast('Link accepted.'); });\n    root.querySelector('#rv-rej').addEventListener('click',()=>{ self.closeDrawer(); self.removeSugg([id]); self.toast('Suggestion rejected.'); });\n    this.openDrawer();\n  }\n  openStale(id){\n    const root=document.getElementById('rev-root'), x=this.ST.find(r=>r.id===id); if(!x) return;\n    const m=this.MEM[x.title]||{ns:x.ns,score:x.score,desc:'',content:''}, nsC=this.nsC, self=this;\n    const sc=x.score>=7?['#ecfdf3','#16a34a']:x.score>=5?['#fef6e7','#d97706']:['#fef2f2','#dc2626'];\n    root.querySelector('#rv-dtitle').textContent='Memory details';\n    root.querySelector('#rv-body').innerHTML=\n      `<div style=\"font-size:17px;font-weight:700;line-height:1.35;margin:18px 0 12px;\">${x.title}<\u002Fdiv>`+\n      `<div style=\"display:flex;gap:7px;flex-wrap:wrap;\">`+\n        `<span style=\"display:inline-flex;align-items:center;gap:6px;background:#f6f6f9;border-radius:999px;padding:4px 10px;font-size:11px;color:#6b7280;\"><span style=\"width:7px;height:7px;border-radius:50%;background:${nsC[x.ns]}\"><\u002Fspan>${x.ns}<\u002Fspan>`+\n        `<span style=\"background:${sc[0]};color:${sc[1]};border-radius:999px;padding:4px 10px;font-size:11px;font-weight:600;\">score ${x.score.toFixed(1)}<\u002Fspan>`+\n        `<span style=\"background:#fef2f2;color:#dc2626;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:600;\">idle ${x.idle}d<\u002Fspan>`+\n      `<\u002Fdiv>`+\n      `<div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#b0b0bd;margin:20px 0 5px;\">Description<\u002Fdiv>`+\n      `<div style=\"font-size:13px;line-height:1.6;color:#3f3f52;\">${m.desc}<\u002Fdiv>`+\n      `<div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#b0b0bd;margin:16px 0 5px;\">Content<\u002Fdiv>`+\n      `<div style=\"font-size:13px;line-height:1.6;color:#3f3f52;background:#f8f8fb;border:1px solid #f0f0f5;border-radius:8px;padding:11px 13px;\">${m.content}<\u002Fdiv>`+\n      `<div style=\"display:flex;gap:8px;margin-top:22px;padding-top:16px;border-top:1px solid #eeeef3;\">`+\n        `<button id=\"rv-refresh\" class=\"selbar-btn\" style=\"flex:1;justify-content:center;background:#f1edff;color:#6a46f5;border-color:#d6c9ff;padding:10px;\"><svg style=\"width:15px;height:15px\"><use href=\"#i-refresh\"/><\u002Fsvg>Refresh<\u002Fbutton>`+\n        `<button id=\"rv-del\" class=\"selbar-btn\" style=\"flex:1;justify-content:center;background:#fff;color:#dc2626;border-color:#f0c9c9;padding:10px;\"><svg style=\"width:15px;height:15px\"><use href=\"#i-trash\"/><\u002Fsvg>Delete<\u002Fbutton>`+\n      `<\u002Fdiv>`;\n    root.querySelector('#rv-refresh').addEventListener('click',()=>{ self.closeDrawer(); self.refreshStale([id]); });\n    root.querySelector('#rv-del').addEventListener('click',()=>{ self.closeDrawer(); self.removeStale([id]); self.toast('Memory deleted.'); });\n    this.openDrawer();\n  }\n  openDrawer(){ const root=document.getElementById('rev-root'); root.querySelector('#rv-drawer').classList.add('open'); root.querySelector('#rv-scrim').classList.add('open'); }\n  closeDrawer(){ const root=document.getElementById('rev-root'); root.querySelector('#rv-drawer').classList.remove('open'); root.querySelector('#rv-scrim').classList.remove('open'); }\n  renderVals(){ return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
