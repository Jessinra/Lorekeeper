<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  body{margin:0;background:#f9f9fb;color:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  *{box-sizing:border-box;}
  @keyframes cp-fade{from{opacity:0;}to{opacity:1;}}
  @keyframes cp-pop{from{opacity:0;transform:translateY(-8px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes cp-toast{0%{opacity:0;transform:translateY(8px);}12%{opacity:1;transform:translateY(0);}88%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(8px);}}
</style>
</helmet>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-shield" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"></path></symbol>
  <symbol id="i-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"></path><path d="M5 10v10h14V10"></path></symbol>
  <symbol id="i-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></symbol>
  <symbol id="i-network" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="6" r="2.5"></circle><circle cx="19" cy="6" r="2.5"></circle><circle cx="12" cy="19" r="2.5"></circle><path d="M7 7.3L10.2 16.5M17 7.3L13.8 16.5M7.5 6H16.5"></path></symbol>
  <symbol id="i-inbox" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 4h16v12l-3 4H7l-3-4V4z"></path><path d="M4 12h5l2 3h2l2-3h5"></path></symbol>
  <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l4 2"></path></symbol>
  <symbol id="i-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"></circle><path d="M12 2.5v3M12 18.5v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2.5 12h3M18.5 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"></path></symbol>
  <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></symbol>
  <symbol id="i-bar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 20V10M12 20V4M20 20v-7"/></symbol>
  <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></symbol>
  <symbol id="i-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9l6 6 6-6"></path></symbol>
  <symbol id="i-doc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M6 3h8l4 4v14H6z"></path><path d="M14 3v4h4M9 12h6M9 16h6"></path></symbol>
  <symbol id="i-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-.6 4"></path><path d="M20 4v5h-5"></path></symbol>
  <symbol id="i-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"></path></symbol>
  <symbol id="i-return" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10l-4 4 4 4"></path><path d="M5 14h11a4 4 0 0 0 4-4V6"></path></symbol>
</defs></svg>

<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#7c5cff"/><g fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"><circle cx="45" cy="45" r="20"/><path d="M60 60l15 15"/></g></svg></template>

<div style="position:relative;width:100%;height:100vh;overflow:hidden;">

  <!-- ===== dimmed dashboard backdrop ===== -->
  <div style="display:flex;height:100%;filter:saturate(.9);">
    <nav style="width:76px;flex-shrink:0;background:#fff;border-right:1px solid #e6e6ee;display:flex;flex-direction:column;align-items:center;padding:16px 0 12px;">
      <div style="width:36px;height:36px;border-radius:8px;background:#7c5cff;color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:24px;"><svg style="width:20px;height:20px"><use href="#i-shield"></use></svg></div>
      <div style="display:flex;flex-direction:column;gap:2px;width:100%;align-items:center;color:#9ca3af;">
        <div style="width:58px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;background:#f1edff;color:#7c5cff;border-radius:8px;font-size:10.5px;font-weight:600;"><svg style="width:19px;height:19px"><use href="#i-home"></use></svg>Home</div>
        <div style="width:58px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;font-size:10.5px;font-weight:500;"><svg style="width:19px;height:19px"><use href="#i-grid"></use></svg>Memories</div>
        <div style="width:58px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;font-size:10.5px;font-weight:500;"><svg style="width:19px;height:19px"><use href="#i-network"></use></svg>Links</div>
        <div style="width:58px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;font-size:10.5px;font-weight:500;"><svg style="width:19px;height:19px"><use href="#i-inbox"></use></svg>Review</div>
        <div style="width:58px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;font-size:10.5px;font-weight:500;"><svg style="width:19px;height:19px"><use href="#i-clock"></use></svg>Sessions</div>
        <div style="width:58px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;font-size:10.5px;font-weight:500;"><svg style="width:19px;height:19px"><use href="#i-bar"></use></svg>Metrics</div>
      </div>
    </nav>
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
      <div style="height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid #e6e6ee;background:#fff;">
        <div style="font-size:14px;color:#9ca3af;">Lorekeeper <span>/</span> <span style="color:#1a1a2e;font-weight:600;">Home</span></div>
        <button onClick="{{ openPalette }}" style="display:flex;align-items:center;gap:8px;border:1px solid #e6e6ee;background:#f9f9fb;border-radius:6px;padding:8px 10px;color:#9ca3af;font-size:13px;width:230px;cursor:pointer;">
          <svg style="width:15px;height:15px;flex-shrink:0"><use href="#i-search"></use></svg><span style="flex:1;text-align:left;">Search or jump to…</span>
          <span style="display:flex;gap:3px;"><kbd style="background:#fff;border:1px solid #e6e6ee;border-radius:4px;font-size:10.5px;padding:1px 5px;color:#6b7280;">⌘</kbd><kbd style="background:#fff;border:1px solid #e6e6ee;border-radius:4px;font-size:10.5px;padding:1px 5px;color:#6b7280;">K</kbd></span>
        </button>
      </div>
      <div style="padding:26px 32px;">
        <div style="height:24px;width:280px;background:#ececf3;border-radius:6px;margin-bottom:22px;"></div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
          <div style="width:324px;height:300px;background:#fff;border:1px solid #e6e6ee;border-radius:14px;"></div>
          <div style="flex:1;min-width:320px;display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div style="background:#fff;border:1px solid #e6e6ee;border-radius:14px;height:142px;"></div>
            <div style="background:#fff;border:1px solid #e6e6ee;border-radius:14px;height:142px;"></div>
            <div style="background:#fff;border:1px solid #e6e6ee;border-radius:14px;height:142px;"></div>
            <div style="background:#fff;border:1px solid #e6e6ee;border-radius:14px;height:142px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== reopen hint when closed ===== -->
  <sc-if value="{{ closed }}" hint-placeholder-val="{{ false }}">
    <button onClick="{{ openPalette }}" style="position:absolute;bottom:26px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:#1a1a2e;color:#fff;border:none;border-radius:999px;padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;box-shadow:0 8px 24px rgba(20,20,30,.25);z-index:60;">
      Press <kbd style="background:rgba(255,255,255,.16);border-radius:4px;padding:1px 6px;font-size:11px;">⌘</kbd><kbd style="background:rgba(255,255,255,.16);border-radius:4px;padding:1px 6px;font-size:11px;">K</kbd> to reopen
    </button>
  </sc-if>

  <!-- ===== opened toast ===== -->
  <sc-if value="{{ opened }}" hint-placeholder-val="">
    <div style="position:absolute;bottom:26px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:#1a1a2e;color:#fff;border-radius:10px;padding:11px 16px;font-size:13px;z-index:70;box-shadow:0 8px 24px rgba(20,20,30,.28);animation:cp-toast 1.9s ease forwards;">
      <svg style="width:15px;height:15px;color:#a78bfa"><use href="#i-return"></use></svg>Opening <b style="font-weight:600;">{{ opened }}</b>
    </div>
  </sc-if>

  <!-- ===== palette overlay ===== -->
  <sc-if value="{{ open }}" hint-placeholder-val="{{ true }}">
    <div onClick="{{ closePalette }}" style="position:absolute;inset:0;background:rgba(24,24,37,.34);backdrop-filter:{{ scrimBlur }};display:flex;justify-content:center;align-items:flex-start;padding-top:96px;z-index:80;opacity:1;animation:cp-fade .12s ease;">
      <div onClick="{{ stop }}" style="width:640px;max-width:92vw;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(20,20,30,.30),0 2px 8px rgba(20,20,30,.12);overflow:hidden;display:flex;flex-direction:column;max-height:74vh;opacity:1;animation:cp-pop .14s cubic-bezier(.2,.8,.3,1);">

        <!-- input row -->
        <div style="display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid #f0f0f5;">
          <svg style="width:19px;height:19px;color:#9ca3af;flex-shrink:0"><use href="#i-search"></use></svg>
          <input ref="{{ inputRef }}" onInput="{{ onInput }}" placeholder="{{ placeholder }}" style="flex:1;border:none;outline:none;background:transparent;font-size:17px;color:#1a1a2e;font-family:inherit;" />
          <kbd style="background:#f4f4f8;border:1px solid #e6e6ee;border-radius:5px;font-size:11px;font-weight:500;padding:3px 8px;color:#9ca3af;flex-shrink:0;">esc</kbd>
        </div>

        <!-- results -->
        <div ref="{{ listRef }}" style="flex:1;overflow-y:auto;padding:8px 8px 10px;">
          <sc-for list="{{ groups }}" as="group" hint-placeholder-count="3">
            <div style="margin-bottom:2px;">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;padding:10px 12px 6px;">{{ group.label }}</div>
              <sc-for list="{{ group.items }}" as="item" hint-placeholder-count="4">
                <div ref="{{ item.ref }}" onClick="{{ item.onSelect }}" onMouseEnter="{{ item.onHover }}" style="display:flex;align-items:center;gap:13px;padding:9px 12px;border-radius:9px;cursor:pointer;background:{{ item.bg }};">
                  <span style="width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:{{ item.iconBg }};color:{{ item.iconColor }};"><svg style="width:17px;height:17px"><use href="#{{ item.icon }}"></use></svg></span>
                  <span style="flex:1;min-width:0;">
                    <span style="display:block;font-size:14px;font-weight:500;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ item.title }}</span>
                    <span style="display:block;font-size:12px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ item.subtitle }}</span>
                  </span>
                  <sc-if value="{{ item.kbd }}" hint-placeholder-val="">
                    <kbd style="background:#f4f4f8;border:1px solid #e6e6ee;border-radius:5px;font-size:11px;font-weight:600;padding:2px 7px;color:#6b7280;flex-shrink:0;">{{ item.kbd }}</kbd>
                  </sc-if>
                  <sc-if value="{{ item.selected }}" hint-placeholder-val="{{ false }}">
                    <span style="display:flex;align-items:center;gap:5px;color:#7c5cff;font-size:12px;font-weight:600;flex-shrink:0;"><svg style="width:15px;height:15px"><use href="#i-return"></use></svg></span>
                  </sc-if>
                </div>
              </sc-for>
            </div>
          </sc-for>

          <sc-if value="{{ empty }}" hint-placeholder-val="{{ false }}">
            <div style="padding:40px 20px;text-align:center;color:#9ca3af;">
              <svg style="width:26px;height:26px;color:#d4d4de;margin-bottom:10px"><use href="#i-search"></use></svg>
              <div style="font-size:14px;">No results for “<b style="color:#6b7280;font-weight:600;">{{ query }}</b>”</div>
              <div style="font-size:12px;margin-top:4px;">Try a memory title, page, or action.</div>
            </div>
          </sc-if>
        </div>

        <!-- footer -->
        <div style="display:flex;align-items:center;gap:18px;padding:10px 18px;border-top:1px solid #f0f0f5;background:#fbfbfd;font-size:11.5px;color:#9ca3af;">
          <span style="display:flex;align-items:center;gap:6px;"><kbd style="background:#fff;border:1px solid #e6e6ee;border-radius:4px;padding:1px 6px;">↑</kbd><kbd style="background:#fff;border:1px solid #e6e6ee;border-radius:4px;padding:1px 6px;">↓</kbd>navigate</span>
          <span style="display:flex;align-items:center;gap:6px;"><kbd style="background:#fff;border:1px solid #e6e6ee;border-radius:4px;padding:1px 6px;">↵</kbd>select</span>
          <span style="display:flex;align-items:center;gap:6px;"><kbd style="background:#fff;border:1px solid #e6e6ee;border-radius:4px;padding:1px 6px;">esc</kbd>close</span>
          <span style="flex:1;"></span>
          <span style="display:flex;align-items:center;gap:6px;"><svg style="width:13px;height:13px;color:#7c5cff"><use href="#i-shield"></use></svg>Lorekeeper</span>
        </div>
      </div>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:800},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#7c5cff&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Palette&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Search or jump to…&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Palette&quot;},&quot;scrimBlur&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Palette&quot;}}">
class Component extends DCLogic {
  state = { open: true, query: 'api', sel: 0, opened: '' };

  componentDidMount(){
    this._flat = this._flat || [];
    this._rows = {};
    this._key = (e) => {
      const k = e.key.toLowerCase();
      if ((e.metaKey || e.ctrlKey) && k === 'k'){ e.preventDefault(); this.setState({ open:true, query:'', sel:0, opened:'' }); this.focusInput(); return; }
      if (!this.state.open) return;
      if (e.key === 'Escape'){ e.preventDefault(); this.setState({ open:false }); }
      else if (e.key === 'ArrowDown'){ e.preventDefault(); this.move(1); }
      else if (e.key === 'ArrowUp'){ e.preventDefault(); this.move(-1); }
      else if (e.key === 'Enter'){ e.preventDefault(); const it = this._flat[this.state.sel]; if (it) this.select(it); }
    };
    window.addEventListener('keydown', this._key);
    this.focusInput();
  }
  componentWillUnmount(){ window.removeEventListener('keydown', this._key); }
  componentDidUpdate(){
    const el = this._rows[this.state.sel], c = this._listEl;
    if (el && c){
      const top = el.offsetTop, bot = top + el.offsetHeight;
      if (top < c.scrollTop) c.scrollTop = top - 8;
      else if (bot > c.scrollTop + c.clientHeight) c.scrollTop = bot - c.clientHeight + 8;
    }
  }

  focusInput(){ setTimeout(() => { if (this._input){ this._input.value = this.state.query || ''; this._input.focus(); } }, 20); }
  move(d){
    const n = (this._flat || []).length; if (!n) return;
    this.setState(s => ({ sel: (s.sel + d + n) % n }));
  }
  select(it){
    clearTimeout(this._t);
    this.setState({ open:false, opened: it.title });
    this._t = setTimeout(() => this.setState({ opened:'' }), 1900);
  }

  master(){
    const pages = [
      { title:'Home', subtitle:'Dashboard & digest', icon:'i-home', group:'Jump to' },
      { title:'Memories', subtitle:'240 stored', icon:'i-grid', group:'Jump to' },
      { title:'Knowledge graph', subtitle:'142 links · 38 memories', icon:'i-network', group:'Jump to' },
      { title:'Review inbox', subtitle:'8 pending link reviews', icon:'i-inbox', group:'Jump to' },
      { title:'Sessions', subtitle:'Recent agent runs', icon:'i-clock', group:'Jump to' },
      { title:'Metrics', subtitle:'Usage & knowledge health', icon:'i-bar', group:'Jump to' },
      { title:'Settings', subtitle:'Workspace configuration', icon:'i-gear', group:'Jump to' },
    ];
    const memories = [
      { title:'API rate limiting patterns', subtitle:'Memory · used 214× · updated 6h ago', icon:'i-doc', group:'Memories' },
      { title:'API auth token refresh flow', subtitle:'Memory · used 97× · updated 2d ago', icon:'i-doc', group:'Memories' },
      { title:'REST API pagination conventions', subtitle:'Memory · used 63× · updated 5d ago', icon:'i-doc', group:'Memories' },
      { title:'Internal API gateway routing', subtitle:'Memory · used 41× · stale 12d', icon:'i-doc', group:'Memories' },
      { title:'Redis caching strategy', subtitle:'Memory · used 88×', icon:'i-doc', group:'Memories' },
      { title:'MCP transport timeout', subtitle:'Memory · used 51×', icon:'i-doc', group:'Memories' },
      { title:'GraphQL gateway spike', subtitle:'Memory · stale 34d', icon:'i-doc', group:'Memories' },
      { title:'Postgres index tuning', subtitle:'Memory · used 132×', icon:'i-doc', group:'Memories' },
    ];
    const actions = [
      { title:'New memory', subtitle:'Create a memory entry', icon:'i-plus', group:'Actions', kbd:'C' },
      { title:'Run sweep engine', subtitle:'Re-score & refresh memories', icon:'i-refresh', group:'Actions', kbd:'S' },
      { title:'Export backup', subtitle:'Download .db snapshot', icon:'i-download', group:'Actions', kbd:'B' },
      { title:'Open review inbox', subtitle:'Resolve 8 pending links', icon:'i-inbox', group:'Actions' },
    ];
    const recent = [
      { title:'API rate limiting patterns', subtitle:'Memory · viewed 12m ago', icon:'i-doc', group:'Recent' },
      { title:'Session sess_2f88a1', subtitle:'build · 6 memories created', icon:'i-clock', group:'Recent' },
      { title:'Knowledge graph', subtitle:'Jump to page', icon:'i-network', group:'Recent' },
      { title:'Metrics', subtitle:'Jump to page', icon:'i-bar', group:'Recent' },
    ];
    return { pages, memories, actions, recent };
  }

  renderVals(){
    const accent = this.props.accentColor ?? '#7c5cff';
    const placeholder = this.props.placeholder ?? 'Search or jump to…';
    const q = (this.state.query || '').trim().toLowerCase();
    const { pages, memories, actions, recent } = this.master();

    let ordered;
    if (!q){
      ordered = [
        { label:'Recent', items: recent },
        { label:'Jump to', items: pages },
        { label:'Actions', items: actions },
      ];
    } else {
      const match = arr => arr.filter(i => (i.title + ' ' + i.subtitle).toLowerCase().includes(q));
      ordered = [
        { label:'Jump to', items: match(pages) },
        { label:'Memories', items: match(memories) },
        { label:'Actions', items: match(actions) },
      ].filter(g => g.items.length);
    }

    // flatten + decorate
    const flat = [];
    this._rows = {};
    const groups = ordered.map(g => ({
      label: g.label,
      items: g.items.map(it => {
        const gi = flat.length;
        const selected = gi === this.state.sel;
        const deco = {
          ...it,
          selected,
          bg: selected ? 'rgba(124,92,255,.09)' : 'transparent',
          iconBg: selected ? 'rgba(124,92,255,.15)' : '#f4f4f8',
          iconColor: selected ? accent : '#6b7280',
          onHover: () => this.setState({ sel: gi }),
          onSelect: () => this.select(it),
          ref: (el) => { if (el) this._rows[gi] = el; },
        };
        flat.push(deco);
        return deco;
      }),
    }));
    this._flat = flat;

    // clamp selection
    if (this.state.sel >= flat.length && flat.length) {
      // defer to avoid setState in render
      setTimeout(() => this.setState({ sel: Math.max(0, flat.length - 1) }), 0);
    }

    return {
      groups,
      empty: flat.length === 0,
      open: this.state.open,
      closed: !this.state.open && !this.state.opened,
      opened: this.state.opened,
      query: this.state.query,
      placeholder,
      scrimBlur: (this.props.scrimBlur ?? true) ? 'blur(2px)' : 'none',
      openPalette: () => { this.setState({ open:true, query:'', sel:0, opened:'' }); this.focusInput(); },
      closePalette: () => this.setState({ open:false }),
      stop: (e) => e.stopPropagation(),
      onInput: (e) => this.setState({ query: e.target.value, sel: 0 }),
      inputRef: (el) => { this._input = el; },
      listRef: (el) => { this._listEl = el; },
    };
  }
}
</script>
</body>
</html>
