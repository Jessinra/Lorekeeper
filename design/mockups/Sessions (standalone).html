document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

f-box\" style=\"width:400px;max-width:100%;background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(20,20,40,.28);padding:24px;transform:translateY(8px);transition:transform .16s;\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\">\n        <span id=\"cf-ic\" style=\"width:38px;height:38px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg style=\"width:19px;height:19px\"><use href=\"#i-trash\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n        <div id=\"cf-title\" style=\"font-size:16px;font-weight:700;color:#1a1a2e;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"cf-body\" style=\"font-size:13px;line-height:1.55;color:#6b7280;\"><\u002Fdiv>\n      <div id=\"cf-name\" style=\"font-size:13px;font-weight:600;color:#1a1a2e;background:#f6f6f9;border:1px solid #ececf3;border-radius:8px;padding:9px 12px;margin-top:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\"><\u002Fdiv>\n      <div style=\"display:flex;gap:8px;margin-top:20px;\">\n        <button id=\"cf-cancel\" style=\"flex:1;border:1px solid #e6e6ee;background:#fff;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:500;color:#1a1a2e;cursor:pointer;\">Cancel<\u002Fbutton>\n        <button id=\"cf-ok\" style=\"flex:1;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;\">Delete<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:780}}\">\nclass Component extends DCLogic {\n  MEM={\n    \"Review inbox triage pattern notes\":{ns:\"dev\",conf:78,uses:12,links:0,updated:\"1d ago\",content:\"Y/N shortcuts cut average triage time per suggestion from ~9s to ~3s in informal testing. Keyboard-first triage beats mouse-only once you're past ~20 items a day.\"},\n    \"Command palette fuzzy match scoring\":{ns:\"dev\",conf:88,uses:25,links:1,updated:\"7h ago\",content:\"Score = 0.6*prefix_match + 0.3*subsequence_match + 0.1*recency. Case-insensitive and diacritic-insensitive.\"},\n    \"FastAPI middleware ordering rules\":{ns:\"dev\",conf:68,uses:22,links:2,updated:\"2d ago\",content:\"Middleware stack (outer to inner): CORS → Auth → RateLimit → RequestLogging → route handlers. Placing RateLimit before Auth leaks limiter state to unauthenticated callers.\"},\n    \"Graph layout node sizing logic\":{ns:\"dev\",conf:63,uses:8,links:0,updated:\"1d ago\",content:\"radius = 8 + min(usage_count, 40) * 0.35. Capping at usage_count=40 keeps mega-hub nodes from dominating the layout.\"},\n    \"Vector embedding cache invalidation logic\":{ns:\"infra\",conf:61,uses:9,links:1,updated:\"2d ago\",content:\"Recompute only if content or title changed. Description-only edits reuse the existing embedding to save cost, flagged with embedding_stale=false.\"},\n    \"Suggestion sweep accuracy audit notes\":{ns:\"default\",conf:59,uses:4,links:0,updated:\"4d ago\",content:\"Sampled 50 accepted links; 6 were judged wrong in hindsight. Most false positives were references mislabeled where contradicts was the better fit.\"},\n    \"Lorekeeper sweep engine confidence floor\":{ns:\"default\",conf:74,uses:15,links:1,updated:\"9h ago\",content:\"Floor is 0.75 weighted_score by default (auto_link_threshold). Lower floors flood the review queue with low-signal noise.\"},\n    \"Concurrent agent session handling\":{ns:\"default\",conf:65,uses:14,links:1,updated:\"3d ago\",content:\"Each session gets a write-ahead buffer; commits are serialized per namespace to avoid duplicate auto-link races.\"},\n    \"MCP transport handshake timeout patterns\":{ns:\"infra\",conf:81,uses:28,links:1,updated:\"1d ago\",content:\"First attempt: 2s timeout. Backoff ×1.8 up to 3 retries. Warn (not error) on retries 1–2; escalate to error on final failure.\"},\n    \"Backup rotation script maintenance\":{ns:\"infra\",conf:92,uses:31,links:0,updated:\"11h ago\",content:\"Runs at 03:00 local time via cron. Keeps the last 14 daily backups and prunes older snapshots. Uses the /api/export endpoint internally.\"},\n    \"Project conventions file — v3\":{ns:\"default\",conf:76,uses:17,links:0,updated:\"4d ago\",content:\"Prefer composition over inheritance. No default exports. Tests colocated with source.\"},\n    \"Local Redis config for cache warmup\":{ns:\"infra\",conf:84,uses:33,links:0,updated:\"3d ago\",content:\"maxmemory 512mb, maxmemory-policy allkeys-lru. Warmup script preloads the top 200 memories by usage_count on boot.\"}\n  };\n  componentDidMount(){ this.wire(); }\n  toast(msg){\n    const t=document.createElement('div');t.textContent=msg;\n    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:11px 20px;border-radius:9px;font:600 13px/1 -apple-system,system-ui,sans-serif;box-shadow:0 10px 28px rgba(0,0,0,.22);z-index:200;opacity:0;transition:opacity .16s;';\n    document.body.appendChild(t);requestAnimationFrame(()=>t.style.opacity='1');\n    setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),220);},1800);\n  }\n  wire(){\n    const root=document.getElementById('sess-root'); if(!root||this._w) return; this._w=true;\n    const self=this;\n    const items=[...root.querySelectorAll('.sess')];\n    let task='', q='';\n    const apply=()=>{\n      let n=0;\n      items.forEach(it=>{\n        const ok=(!task||it.dataset.task===task)&&(!q||it.dataset.topic.includes(q)||it.dataset.id.includes(q));\n        it.style.display=ok?'':'none'; if(ok)n++;\n      });\n      root.querySelectorAll('.grp').forEach(g=>{ const any=[...g.querySelectorAll('.sess')].some(s=>s.style.display!=='none'); g.style.display=any?'':'none'; });\n      root.querySelector('#sess-count').textContent=(task||q)?`${n} of 200 sessions`:'200 sessions';\n      root.querySelector('#sess-empty').style.display=n?'none':'block';\n    };\n    root.querySelectorAll('#sess-chips .chip').forEach(c=>c.addEventListener('click',()=>{\n      root.querySelectorAll('#sess-chips .chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); task=c.dataset.task; apply();\n    }));\n    root.querySelector('#sess-q').addEventListener('input',e=>{ q=e.target.value.trim().toLowerCase(); apply(); });\n    items.forEach(it=>it.addEventListener('click',()=>self.open(it)));\n    root.querySelector('#sd-close').addEventListener('click',()=>self.close());\n    root.querySelector('#sess-scrim').addEventListener('click',()=>self.close());\n    // memory detail drawer (same component as the Memories page)\n    root.querySelectorAll('[data-toast]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();self.toast(b.getAttribute('data-toast'));}));\n    root.querySelector('#d-close').addEventListener('click',()=>self.closeMemory());\n    root.querySelector('#mem-scrim').addEventListener('click',()=>self.closeMemory());\n    root.querySelector('#d-edit-btn').addEventListener('click',()=>self.setMode(true));\n    root.querySelector('#d-cancel').addEventListener('click',()=>{ if(self._mem) self.openMemory(self._mem); else self.setMode(false); });\n    root.querySelector('#d-save').addEventListener('click',()=>{ self.setMode(false); self.toast('Memory saved'); });\n    ['#d-desc-edit','#d-content-edit'].forEach(s=>{ const el=root.querySelector(s); if(el) el.addEventListener('input',()=>self.autosize(el)); });\n    root.querySelector('#d-soft').addEventListener('click',()=>{ self.closeMemory(); self.toast('Memory soft-deleted.'); });\n    root.querySelectorAll('#mem-drawer [data-confirm]').forEach(b=>b.addEventListener('click',()=>self.confirmDelete(b.getAttribute('data-confirm'))));\n    root.querySelector('#cf-cancel').addEventListener('click',()=>self.closeConfirm());\n    root.querySelector('#cf-scrim').addEventListener('click',e=>{ if(e.target===root.querySelector('#cf-scrim')) self.closeConfirm(); });\n  }\n  open(it){\n    const root=document.getElementById('sess-root');\n    root.querySelector('#sd-title').textContent=it.dataset.topic.replace(/\\b\\w/g,c=>c.toUpperCase());\n    const t=it.dataset.task, cls={build:'b-build',design:'b-design',review:'b-review',debug:'b-debug',other:'b-other'}[t]||'b-other';\n    root.querySelector('#sd-meta').innerHTML=`<span class=\"badge ${cls}\">${t}<\u002Fspan><span style=\"background:#f1f1f6;border-radius:999px;padding:4px 10px;font-size:11px;color:#6b7280;\">${it.dataset.dur}<\u002Fspan><span style=\"background:#f1f1f6;border-radius:999px;padding:4px 10px;font-size:11px;color:#6b7280;\">${it.dataset.date}<\u002Fspan>`;\n    root.querySelector('#sd-id').textContent=it.dataset.id;\n    root.querySelector('#sd-sum').textContent=it.dataset.sum;\n    let mems=[]; try{ mems=JSON.parse(it.dataset.memories||'[]'); }catch(e){ mems=[]; }\n    root.querySelector('#sd-mem-count').textContent=mems.length+(mems.length===1?' memory':' memories');\n    const esc=s=>String(s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));\n    const box=root.querySelector('#sd-mem');\n    box.innerHTML=mems.map(m=>{\n      const c=m.s>=7?['#ecfdf3','#16a34a']:m.s>=4?['#fef6e7','#d97706']:['#fef2f2','#dc2626'];\n      return `<button class=\"sd-mem-item\" data-title=\"${esc(m.t)}\" style=\"display:flex;width:100%;gap:12px;align-items:flex-start;text-align:left;border:1px solid #ececf3;background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .12s,background .12s;\">`+\n        `<span style=\"flex:1;min-width:0;\"><span style=\"display:block;font-size:13px;font-weight:600;color:#1a1a2e;\">${esc(m.t)}<\u002Fspan>`+\n        `<span style=\"display:block;font-size:12px;color:#6b7280;line-height:1.5;margin-top:3px;\">${esc(m.d)}<\u002Fspan><\u002Fspan>`+\n        `<span style=\"background:${c[0]};color:${c[1]};border-radius:6px;padding:2px 8px;font-weight:600;font-size:12px;flex-shrink:0;\">${m.s.toFixed(1)}<\u002Fspan><\u002Fbutton>`;\n    }).join('');\n    this._mems=mems;\n    box.querySelectorAll('.sd-mem-item').forEach((b,i)=>b.addEventListener('click',()=>this.openMemory(this._mems[i])));\n    root.querySelector('#sess-drawer').classList.add('open');\n    root.querySelector('#sess-scrim').classList.add('open');\n  }\n  autosize(el){ if(!el) return; el.style.height='auto'; el.style.height=(el.scrollHeight)+'px'; }\n  setFieldsEditable(edit){\n    const root=document.getElementById('sess-root');\n    const flds=[...root.querySelectorAll('#mem-drawer .d-fld')];\n    flds.forEach(el=>{\n      if(edit){ el.removeAttribute('readonly'); } else { el.setAttribute('readonly','readonly'); }\n      const isTitle=el.classList.contains('d-title-fld');\n      if(isTitle){\n        el.style.border=edit?'1px solid #e6e6ee':'1px solid transparent';\n        el.style.background=edit?'#fff':'transparent';\n        el.style.padding=edit?'8px 12px':'0';\n        el.style.color='#1a1a2e'; el.style.webkitTextFillColor='#1a1a2e';\n        el.style.cursor=edit?'text':'default';\n      } else {\n        el.style.border=edit?'1px solid #e6e6ee':'1px solid #ececf3';\n        el.style.background=edit?'#fff':'#f6f6f9';\n        el.style.padding='10px 12px';\n        el.style.color=edit?'#1a1a2e':'#8a8a99';\n        el.style.webkitTextFillColor=edit?'#1a1a2e':'#8a8a99';\n        el.style.cursor=edit?(el.tagName==='SELECT'?'pointer':'text'):'default';\n      }\n    });\n    const ns=root.querySelector('#d-ns-edit'); if(ns){ ns.disabled=!edit; ns.style.backgroundImage=edit?'linear-gradient(45deg,transparent 50%,#9ca3af 50%),linear-gradient(135deg,#9ca3af 50%,transparent 50%)':'none'; ns.style.backgroundPosition='calc(100% - 16px) center,calc(100% - 11px) center'; ns.style.backgroundSize='5px 5px,5px 5px'; ns.style.backgroundRepeat='no-repeat'; }\n    root.querySelectorAll('#mem-drawer .d-lbl').forEach(l=>l.style.paddingLeft='0');\n  }\n  setMode(edit){\n    const root=document.getElementById('sess-root'), drawer=root.querySelector('#mem-drawer');\n    drawer.classList.toggle('editing',edit);\n    root.querySelector('#d-editing-badge').style.display=edit?'inline-flex':'none';\n    root.querySelector('#d-readonly-badge').style.display=edit?'none':'inline-flex';\n    root.querySelector('#d-danger').style.display=edit?'block':'none';\n    root.querySelector('#d-foot-view').style.display=edit?'none':'flex';\n    root.querySelector('#d-foot-edit').style.display=edit?'flex':'none';\n    this.setFieldsEditable(edit);\n    ['#d-desc-edit','#d-content-edit'].forEach(s=>this.autosize(root.querySelector(s)));\n    if(edit) root.querySelector('#d-title-edit').focus();\n  }\n  openMemory(mem){\n    if(!mem) return;\n    const root=document.getElementById('sess-root');\n    this._mem=mem;\n    const info=this.MEM[mem.t]||{};\n    root.querySelector('#d-title-edit').value=mem.t;\n    root.querySelector('#d-desc-edit').value=mem.d;\n    root.querySelector('#d-content-edit').value=info.content||mem.d;\n    root.querySelector('#d-score-edit').value=mem.s;\n    root.querySelector('#d-ns-edit').value=info.ns||'default';\n    const chip=(l,v)=>`<span style=\"background:#f1f1f6;border-radius:999px;padding:4px 10px;font-size:11px;color:#6b7280;\">${l}: <strong style=\"color:#1a1a2e;font-weight:600;\">${v}<\u002Fstrong><\u002Fspan>`;\n    root.querySelector('#d-meta').innerHTML=chip('conf',(info.conf??0)+'%')+chip('uses',info.uses??0)+chip('links',info.links??0)+chip('updated',info.updated||'—');\n    this.setMode(false);\n    root.querySelector('#mem-drawer').classList.add('open');\n    root.querySelector('#mem-scrim').classList.add('open');\n    requestAnimationFrame(()=>{ ['#d-desc-edit','#d-content-edit'].forEach(s=>this.autosize(root.querySelector(s))); });\n  }\n  closeMemory(){\n    const root=document.getElementById('sess-root');\n    root.querySelector('#mem-drawer').classList.remove('open');\n    root.querySelector('#mem-scrim').classList.remove('open');\n    this.setMode(false);\n  }\n  confirmDelete(kind){\n    const root=document.getElementById('sess-root'), self=this;\n    const name=root.querySelector('#d-title-edit').value||'this memory';\n    const soft=kind==='soft';\n    root.querySelector('#cf-title').textContent=soft?'Soft-delete memory?':'Delete permanently?';\n    root.querySelector('#cf-body').innerHTML=soft\n      ? 'It will be hidden from search but stays recoverable from the deleted view.'\n      : 'This removes the memory and all its links for good. <strong style=\"color:#b91c1c;\">This cannot be undone.<\u002Fstrong>';\n    root.querySelector('#cf-name').textContent=name;\n    const ic=root.querySelector('#cf-ic'), ok=root.querySelector('#cf-ok');\n    ic.style.background=soft?'#f1f1f6':'#fef2f2';\n    ic.style.color=soft?'#6b7280':'#dc2626';\n    ic.querySelector('use').setAttribute('href',soft?'#i-archive':'#i-trash');\n    ok.style.background=soft?'#1a1a2e':'#dc2626';\n    ok.textContent=soft?'Soft-delete':'Delete permanently';\n    const okClone=ok.cloneNode(true); ok.parentNode.replaceChild(okClone,ok);\n    okClone.addEventListener('click',()=>{ self.closeConfirm(); self.closeMemory(); self.toast(soft?'Memory soft-deleted.':'Memory permanently deleted.'); });\n    const sc=root.querySelector('#cf-scrim'); sc.style.pointerEvents='auto'; sc.style.opacity='1';\n    root.querySelector('#cf-box').style.transform='translateY(0)';\n  }\n  closeConfirm(){\n    const root=document.getElementById('sess-root'), sc=root.querySelector('#cf-scrim');\n    sc.style.opacity='0'; sc.style.pointerEvents='none';\n    root.querySelector('#cf-box').style.transform='translateY(8px)';\n  }\n  close(){\n    const root=document.getElementById('sess-root');\n    this.closeMemory();\n    root.querySelector('#sess-drawer').classList.remove('open');\n    root.querySelector('#sess-scrim').classList.remove('open');\n  }\n  renderVals(){ return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
